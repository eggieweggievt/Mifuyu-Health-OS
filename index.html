<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mifuyu OS ❄️🦊</title>
<link rel="icon" type="image/png" href="sakura.png" />
<link rel="apple-touch-icon" href="AYAYA.png" />
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#758ac6" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />

<!-- =========================================================================
  Mifuyu OS — a gentle, private snowfox companion + creator OS for Mifu 🦊❄️
  PCOS patterns · Mounjaro (tirzepatide) journey · weight (trend-first) ·
  mental-health Care tools · gentle pattern-spotter. NOT a medical device.
  Self-tracking, not diagnosis — her care team's plan always comes first.
========================================================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet" />
<!-- Supabase is loaded lazily at boot, and only when CONFIG keys are set (see start() at the bottom). -->
<style>
  :root{
    /* snowfox winter palette */
    --bg:#eef2fb; --bg2:#f4eefb; --panel:#fff; --panel-soft:#f6f8ff;
    --line:#e4e6f5; --line-2:#dde0f1; --ink:#3a3550; --ink-soft:#6a6488; --muted:#9b96b6;
    --peri:#758ac6; --peri-deep:#5f74b4; --sakura:#ff9ed8; --sakura-deep:#ec74bf;
    --lav:#a98fe0; --lav-deep:#8d6fd1; --mint:#6fc3ab; --ice:#9fc3e8; --peach:#f3a978;
    --shadow:0 6px 22px rgba(120,130,200,.14); --shadow-sm:0 2px 8px rgba(120,130,200,.10);
    --r:18px; --sans:"Quicksand",ui-rounded,"SF Pro Rounded",system-ui,sans-serif; --display:"Fredoka",var(--sans);
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  /* page-width clamp: one stray wide element otherwise makes the whole page scroll sideways
     and "everything sits slightly left" on iPad portrait — wide things scroll INSIDE their panels.
     ⚠️ NEVER put overflow-x on html/body: it silently forces overflow-y to auto and KILLS vertical
     scroll in standalone/PWA + iOS. Clip on the wrapper (main) only — clip doesn't drag the y-axis along. */
  html,body{width:100%;max-width:100%;}
  main{overflow-x:clip;}
  /* native-app feel */
  html{-webkit-text-size-adjust:100%;}
  *{-webkit-tap-highlight-color:transparent;}            /* no gray iOS tap flash */
  body{overscroll-behavior-y:none;}                      /* no whole-page rubber-band */
  nav{overscroll-behavior-x:contain;}                    /* tab-strip swipes don't yank the page */
  body{background:var(--bg);background-image:radial-gradient(80% 50% at 100% 0%,#f7e0f3 0%,transparent 60%),radial-gradient(70% 50% at 0% 0%,#e2e9fb 0%,transparent 55%);background-attachment:fixed;color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;font-weight:500;-webkit-font-smoothing:antialiased;min-height:100vh;}
  h1,h2,h3{font-family:var(--display);font-weight:600;margin:0;}
  .muted{color:var(--muted);} .soft{color:var(--ink-soft);} .peri{color:var(--peri-deep);} .sak{color:var(--sakura-deep);} .lav{color:var(--lav-deep);} .mint{color:#3a9d83;}
  .num{font-variant-numeric:tabular-nums;} a{color:var(--lav-deep);}
  button{font-family:inherit;cursor:pointer;font-weight:600;} input,textarea,select{font-family:inherit;font-weight:500;}
  .label{font-size:10.5px;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:16px;}
  .inp{background:#fff;border:1.5px solid var(--line-2);border-radius:12px;padding:9px 12px;color:var(--ink);font-size:13px;width:100%;outline:none;}
  .inp:focus{border-color:var(--peri);box-shadow:0 0 0 3px rgba(117,138,198,.14);}
  textarea.inp{resize:vertical;}
  .btn{background:#fff;border:1.5px solid var(--line-2);border-radius:12px;color:var(--ink-soft);font-size:12px;padding:7px 14px;transition:.15s;}
  .btn:hover{border-color:var(--peri);color:var(--peri-deep);}
  .btn-grad{background:linear-gradient(135deg,var(--peri),var(--sakura));color:#fff;border:none;box-shadow:var(--shadow-sm);}
  .btn-grad:hover{filter:brightness(1.05);color:#fff;}
  .pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:999px;letter-spacing:.03em;display:inline-block;}
  .pill-peri{background:#e6ecfb;color:var(--peri-deep);} .pill-sak{background:#fde2f2;color:var(--sakura-deep);}
  .pill-lav{background:#ece2fb;color:var(--lav-deep);} .pill-mint{background:#dcf3eb;color:#2f9d79;}
  .pill-ice{background:#e2f0fb;color:#3c7bb0;} .pill-gray{background:#f0eef6;color:var(--muted);}
  ::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-thumb{background:#ddd9ef;border-radius:9px;}
  #rail{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;position:sticky;top:0;z-index:20;background:rgba(255,255,255,.80);backdrop-filter:blur(12px);border-bottom:2px solid transparent;border-image:linear-gradient(90deg,#9fc3e8,#758ac6,#a98fe0,#ff9ed8) 1;flex-wrap:wrap;gap:8px;}
  .brand{font-family:var(--display);font-size:18px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px;}
  .brand-logo{height:30px;width:auto;display:block;flex:0 0 auto;filter:drop-shadow(0 1px 3px rgba(141,111,209,.3));}
  .brand-name{background:linear-gradient(120deg,#5f74b4,#8d6fd1 50%,#ec74bf);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;letter-spacing:.02em;font-size:17px;}
  nav{display:flex;gap:4px;flex-wrap:wrap;}
  .tab{font-size:13px;padding:6px 13px;border-radius:999px;color:var(--ink-soft);border:none;background:none;}
  .tab.active{background:linear-gradient(135deg,#e6ecfb,#fde2f2);color:var(--sakura-deep);} .tab:hover{color:var(--sakura-deep);}
  #rail .right{display:flex;align-items:center;gap:9px;}
  .chip{font-size:11px;padding:4px 10px;border-radius:999px;border:1.5px solid var(--line-2);color:var(--muted);background:#fff;}
  .chip.on{color:#3a9d83;border-color:#bfe9d8;background:#f0fbf6;} .chip.demo{color:var(--lav-deep);border-color:#ddcdf6;background:#f6f0ff;}
  .avatar{width:34px;height:34px;border-radius:999px;background:linear-gradient(135deg,var(--peri),var(--sakura));display:grid;place-items:center;color:#fff;font-weight:700;overflow:hidden;}
  .avatar img{width:100%;height:100%;object-fit:cover;object-position:center;}
  main{padding:18px;max-width:1320px;margin:0 auto;}
  .grid-home{display:grid;grid-template-columns:320px minmax(0,1fr) 320px;gap:16px;}
  .col{display:flex;flex-direction:column;gap:16px;}
  @media(max-width:1040px){.grid-home{grid-template-columns:1fr;}}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
  .soft-card{background:var(--panel-soft);border:1px solid var(--line);border-radius:14px;padding:12px;}
  .seg{display:inline-flex;background:#eef0fa;border-radius:999px;padding:3px;gap:2px;flex-wrap:wrap;}
  .seg button{border:none;background:none;border-radius:999px;padding:5px 11px;font-size:12px;color:var(--ink-soft);}
  .seg button.on{background:#fff;color:var(--sakura-deep);box-shadow:var(--shadow-sm);}
  .bar{height:6px;border-radius:999px;background:#ede9f6;overflow:hidden;} .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--peri),var(--sakura));}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:60;background:linear-gradient(135deg,var(--peri),var(--sakura));color:#fff;padding:10px 20px;border-radius:999px;font-weight:700;font-size:13px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;}
  .toast.show{opacity:1;}
  .hidden{display:none!important;} .grow{flex:1;}
  .listrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line);} .listrow:first-child{border-top:none;}
  .x{cursor:pointer;color:var(--muted);border:none;background:none;font-size:15px;} .x:hover{color:var(--sakura-deep);}
  .disc{display:flex;gap:8px;align-items:flex-start;background:linear-gradient(90deg,#eef2ff,#fdf0fb);border:1px dashed var(--lav);border-radius:14px;padding:10px 12px;font-size:11.5px;color:var(--ink-soft);margin-top:14px;}
  .disc b{color:var(--peri-deep);}
  .slip{background:linear-gradient(120deg,#e9eefb,#fdeaf6);border:1px solid var(--line);border-radius:16px;padding:13px 16px;text-align:center;font-family:var(--display);font-size:15px;color:var(--ink);display:flex;align-items:center;justify-content:center;gap:10px;}
  .slip img.deco{height:22px;width:auto;opacity:.92;flex:0 0 auto;}
  .slip .slip-txt{min-width:0;}
  /* ---- accessibility ---- */
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important;} }
  body.calm *{animation:none!important;transition:none!important;}
  body.calm{background-image:none;background:#f2f3f8;--peri:#8b9bcf;--peri-deep:#7485bb;--sakura:#e6b6da;--sakura-deep:#bd86ad;--lav:#aea0d2;--lav-deep:#8b7cb8;--mint:#86c2af;}
  body.text-lg{font-size:16px;} body.text-lg .label{font-size:11.5px;} body.text-lg .pill{font-size:12px;}
  /* scales + chip toggles */
  .scale{display:flex;gap:4px;flex-wrap:wrap;}
  .scale button{min-width:34px;height:34px;border:1.5px solid var(--line-2);border-radius:9px;background:#fff;color:var(--ink-soft);font-size:12px;}
  .scale button.on{background:linear-gradient(135deg,var(--peri),var(--sakura));border-color:var(--peri);color:#fff;}
  .scale-ends{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-top:3px;}
  .field{margin:12px 0;} .field>.label{margin-bottom:6px;}
  .chiptog{border:1.5px solid var(--line-2);border-radius:999px;padding:7px 13px;background:#fff;color:var(--ink-soft);font-size:12.5px;display:inline-flex;align-items:center;gap:7px;}
  .chiptog.on{background:#fde2f2;border-color:var(--sakura);color:var(--sakura-deep);}
  .chiprow{display:flex;flex-wrap:wrap;gap:7px;}
  .sitebtn{border:1.5px solid var(--line-2);border-radius:11px;padding:7px 11px;background:#fff;color:var(--ink-soft);font-size:12px;}
  .sitebtn.on{background:linear-gradient(135deg,var(--peri),var(--sakura));border-color:var(--peri);color:#fff;}
  /* entrance / transition animations */
  @keyframes viewFade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  @keyframes panelIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes softPop{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  /* Page transition — animate ONLY #view and its DIRECT children (one gentle slide-fade, no scale).
     Never animate nested descendants too: a parent and its child both transforming at once is what
     caused the stutter. Single clean layer = smooth. (Mirrors the smooth Eggie-OS approach.) */
  #view.anim{animation:viewFade .4s cubic-bezier(.22,.61,.36,1) both;}
  #view.anim>*{animation:panelIn .44s cubic-bezier(.22,.61,.36,1) both;}
  #view.anim>*:nth-child(2){animation-delay:.06s}
  #view.anim>*:nth-child(3){animation-delay:.12s}
  #view.anim>*:nth-child(4){animation-delay:.18s}
  #view.anim>*:nth-child(n+5){animation-delay:.22s}
  /* modal + pet chat scale-in */
  .modal-bg{animation:fadeIn .18s ease;}
  .modal{animation:softPop .26s cubic-bezier(.2,.8,.3,1);}
  #kikoChat:not(.hidden){animation:softPop .24s cubic-bezier(.2,.8,.3,1);}
  .tab{transition:background .16s,color .16s,transform .12s;}
  .tab:active{transform:scale(.95);}
  .btn,.btn-grad,.chip{transition:transform .12s,filter .15s,border-color .15s,color .15s,background .15s;}
  .btn:active,.btn-grad:active{transform:scale(.96);}
  .pill{transition:transform .12s;}
  .scale button,.chiptog,.sitebtn,.tog{transition:transform .12s,background .15s,border-color .15s,color .15s;}
  .scale button:active,.chiptog:active,.sitebtn:active{transform:scale(.93);}
  /* sparkline bars */
  .spark{display:flex;align-items:flex-end;gap:2px;height:40px;}
  .spark span{flex:1;background:linear-gradient(180deg,var(--sakura),var(--peri));border-radius:3px 3px 0 0;min-height:2px;opacity:.9;}
  .spark span.gap{background:#e9e6f2;opacity:.5;min-height:2px;}
  .sparkrow{display:flex;align-items:center;gap:10px;margin:9px 0;}
  .sparkrow .lab{width:118px;font-size:12px;} .sparkrow .now{width:38px;text-align:right;font-weight:700;font-size:13px;font-family:var(--display);}
  /* bignum / stepper */
  .bignum{font-family:var(--display);font-size:26px;color:var(--ink);}
  .hcount{display:flex;align-items:center;gap:10px;} .hcount>span{min-width:34px;text-align:center;font-size:20px;font-family:var(--display);color:var(--ink);}
  .step{width:34px;height:34px;border-radius:11px;border:1.5px solid var(--line-2);background:#fff;color:var(--ink-soft);font-size:17px;display:grid;place-items:center;}
  /* accordion */
  details.acc{border:1px solid var(--line);border-radius:14px;background:var(--panel);box-shadow:var(--shadow-sm);margin-bottom:12px;overflow:hidden;}
  details.acc>summary{list-style:none;cursor:pointer;padding:13px 16px;font-family:var(--display);font-size:15px;color:var(--ink);display:flex;align-items:center;justify-content:space-between;gap:8px;}
  details.acc>summary::-webkit-details-marker{display:none;}
  details.acc>summary::after{content:"▸";color:var(--muted);transition:transform .2s;}
  details.acc[open]>summary::after{transform:rotate(90deg);}
  details.acc>.acc-body{padding:2px 16px 16px;}
  /* care: breathing bubble */
  .breath-wrap{position:relative;height:230px;display:grid;place-items:center;}
  .breath-bubble{width:108px;height:108px;border-radius:999px;background:radial-gradient(circle at 35% 30%,#fff,var(--sakura) 56%,var(--peri));box-shadow:0 0 42px rgba(141,111,209,.45);transform:scale(.72);will-change:transform;}
  .breath-label{position:absolute;font-family:var(--display);font-size:17px;color:#fff;text-shadow:0 1px 7px rgba(95,116,180,.7);pointer-events:none;}
  /* care: flip cards */
  .deck{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
  /* planner board */
  .kanban{display:grid;grid-template-columns:repeat(3,minmax(160px,1fr));gap:10px;align-items:start;overflow-x:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;}
  .kcol{background:rgba(255,255,255,.45);border:1px solid var(--line);border-radius:14px;padding:8px;min-height:90px;display:flex;flex-direction:column;gap:6px;transition:background .15s,border-color .15s;}
  .kcol.kover{background:#f3eefc;border-color:var(--lav);}
  .citem{background:#fff;border:1px solid var(--line);border-radius:12px;padding:9px 10px;box-shadow:var(--shadow-sm);cursor:grab;}
  .citem:active{cursor:grabbing;}
  @media (max-width:640px){ .kanban{grid-template-columns:1fr;} }   /* phone: columns stack — ◀ ▶ move cards */
  .flip{perspective:1100px;min-height:198px;cursor:pointer;}
  .flip-inner{position:relative;width:100%;min-height:198px;transition:transform .6s;transform-style:preserve-3d;}
  .flip.open .flip-inner{transform:rotateY(180deg);}
  .flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;border:1px solid var(--line);padding:14px;display:flex;flex-direction:column;}
  .flip-back{background:#fff;transform:rotateY(180deg);overflow:auto;font-size:12px;color:var(--ink-soft);}
  .flip-back li{margin:6px 0;}
  /* care: 3-up row (breathing · check-in · joy jar) */
  .care-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;align-items:stretch;}
  .care-cols>.panel{margin:0;}
  @media(max-width:860px){ .care-cols{grid-template-columns:1fr;} }
  /* health: PCOS (left) + Mounjaro (right) */
  .health-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
  .health-col{display:flex;flex-direction:column;gap:16px;min-width:0;}
  .health-col>section{margin:0;}
  @media(max-width:860px){ .health-cols{grid-template-columns:1fr;} }
  /* care: joy jar */
  .jar-stage{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .jar-bub{animation:jarfloat 4.5s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
  @keyframes jarfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .joy-pick{min-height:26px;font-family:var(--display);font-size:16px;color:var(--lav-deep);margin-top:8px;text-align:center;}
  .joy-pick.pop{animation:joypop .5s ease;} @keyframes joypop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.13)}100%{transform:scale(1);opacity:1}}
  /* sticky notes */
  /* modular layout — drag-reorder · resize · minimize/remove · masonry */
  .grid-modular{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));grid-auto-rows:8px;grid-auto-flow:row dense;gap:0 16px;}   /* row-gap 0: the 16px lives inside the span math → uniform spacing */
  .home-widget{position:relative;transition:transform .24s cubic-bezier(.2,.8,.25,1);min-width:0;}
  .home-widget.resizing{transition:none;outline:2px dashed var(--sakura);outline-offset:3px;border-radius:18px;}
  .home-widget.reordering{outline:2px dashed var(--lav);outline-offset:3px;border-radius:18px;}
  .home-widget.dragsrc,#nav .tab.dragsrc{visibility:hidden;}
  .home-widget.min>.panel,.home-widget.min>section{max-height:54px;overflow:hidden;}
  #nav .tab{touch-action:pan-y;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;}   /* pan-y: finger/Pencil can still scroll the page from a tab; sideways drag reorders */
  .drag-clone{position:fixed;left:0;top:0;z-index:9999;pointer-events:none;border-radius:18px;box-shadow:0 16px 38px rgba(120,80,120,.34);opacity:.97;}
  .home-tools{position:absolute;top:8px;right:8px;z-index:6;display:flex;gap:3px;}
  .home-tools button{border:none;background:rgba(255,255,255,.72);border-radius:8px;font-size:13px;line-height:1;color:#9b8fae;cursor:pointer;padding:5px 7px;opacity:.45;touch-action:none;user-select:none;-webkit-user-select:none;}
  .home-tools .home-grip{cursor:grab;}
  .home-widget:hover .home-tools button,.home-tools button:hover{opacity:.95;}
  .home-resize{position:absolute;right:4px;bottom:4px;z-index:6;border:none;background:rgba(255,255,255,.72);border-radius:8px;font-size:14px;line-height:1;color:#9b8fae;cursor:nwse-resize;padding:4px 6px;opacity:.45;touch-action:none;user-select:none;-webkit-user-select:none;}
  .home-widget:hover .home-resize,.home-resize:hover{opacity:.95;}
  .home-add{border:2px dashed var(--line);border-radius:16px;background:rgba(255,255,255,.4);color:var(--lav-deep);font-size:13px;cursor:pointer;min-height:80px;grid-column:span 4;grid-row:span 6;}
  body.locked .home-tools,body.locked .home-resize,body.locked .home-add{display:none!important;}
  #lockChip.on{background:#fde2f2;color:var(--sakura-deep);}
  @media (hover:none){ .home-tools button,.home-resize{opacity:.92;} .home-tools button{padding:7px 9px;font-size:14px;} .home-resize{padding:6px 9px;font-size:15px;} .sticky-tools button{width:24px;height:24px;font-size:13px;} .sticky-head{height:32px;} }
  /* iPad portrait & narrower: tighter rail + readable calendar */
  @media (max-width:900px){
    .tab{padding:6px 10px;font-size:12px;}
    .cal-cell{min-height:74px;padding:3px 4px;}
    .cal-ev,.cal-stream,.cal-bday{font-size:9.5px;padding:1px 4px;}
    .cal-daynum{font-size:10px;}
  }
  /* PWA / notch safe areas (installed on iPhone/iPad) */
  #rail{padding-left:calc(20px + env(safe-area-inset-left,0px));padding-right:calc(20px + env(safe-area-inset-right,0px));}
  #addStickyBtn{bottom:calc(16px + env(safe-area-inset-bottom,0px));}
  #restBtn{bottom:calc(16px + env(safe-area-inset-bottom,0px));}
  #snowWindBtn{bottom:calc(16px + env(safe-area-inset-bottom,0px));}
  .sticky{max-width:calc(100vw - 16px);}   /* a sticky can never poke off-screen on a small device */
  /* instant, native-feeling taps — drag handles (grips, sticky head/corner, Kiko, tabs) keep their own touch-action */
  .btn,.chip,.chiptog,.sitebtn,.kiko-skill,.x,.pill,.scale button,.seg>button,.tog,.cal-swatch{touch-action:manipulation;}
  .btn:active,.sitebtn:active,.kiko-skill:active,.seg>button:active{transform:scale(.96);transition:transform .06s ease;}
  .btn,.chiptog,.kiko-skill{-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;}
  @media (display-mode:standalone){ #rail{padding-top:calc(8px + env(safe-area-inset-top,0px));} }   /* installed app clears the notch/status bar */
  @media (pointer:coarse){ .btn{padding:9px 15px;} #rail{backdrop-filter:blur(8px);} }   /* fatter targets; lighter blur scrolls smoother */
  /* ===== phones (and the installed Home-Screen app) ≤640px ===== */
  @media (max-width:640px){
    #rail{padding:8px calc(10px + env(safe-area-inset-right,0px)) 6px calc(10px + env(safe-area-inset-left,0px));}

  .spice{display:flex;gap:3px;align-items:center;}

  .jr-cell:hover{border-color:var(--lav);transform:scale(1.02);}

  @media(max-width:640px){ .jr-cell{min-height:54px;padding:3px 4px;} .jr-meta{font-size:8px;} }
  /* ============================================================
     UI FOUNDATION 2.0 — additive layer: motion · focus · loading · polish · responsive.
     Enhances existing classes, preserves the snowfox aesthetic. All motion auto-disables
     under prefers-reduced-motion and body.calm (global rules above). 2026-06-14.
     ============================================================ */
  :root{
    --dur-1:.12s; --dur-2:.2s; --dur-3:.34s;
    --ease:cubic-bezier(.22,.61,.36,1);          /* gentle ease-out */
    --ease-spring:cubic-bezier(.2,.8,.3,1);      /* soft overshoot */
    --elev-1:0 4px 14px rgba(120,130,200,.14);
    --elev-2:0 12px 30px rgba(120,130,200,.20);
  }
  /* ---- A11Y: visible keyboard focus on EVERY interactive element (was inputs-only) ---- */
  a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible,
  select:focus-visible, summary:focus-visible, [tabindex]:focus-visible, [role="button"]:focus-visible,
  .tab:focus-visible, .chip:focus-visible, .btn:focus-visible, .btn-grad:focus-visible,
  .chiptog:focus-visible, .sitebtn:focus-visible, .scale button:focus-visible, .seg button:focus-visible,
  .focus-row:focus-visible, .ci-btn:focus-visible, .x:focus-visible{
    outline:2.5px solid var(--peri-deep); outline-offset:2px;
  }
  :focus:not(:focus-visible){ outline:none; }            /* no ring on mouse/touch, only keyboard */
  .inp:focus-visible{ outline:none; }                    /* inputs keep their own soft ring */
  .sr-only{ position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }
  /* ---- TACTILE POLISH — whisper-subtle elevation on hover (iOS-minimal, no sheen) ---- */
  @media (hover:hover) and (pointer:fine){
    .btn:hover{ box-shadow:var(--elev-1); }
    .btn-grad:hover{ box-shadow:0 3px 10px rgba(150,120,200,.18); }
    .panel.interactive:hover, .soft-card.interactive:hover, .focus-row:hover{ box-shadow:var(--elev-1); }
    .focus-row:hover{ background:#fdf6fb; }
  }
  .panel.interactive, .soft-card.interactive, .focus-row{ transition:box-shadow var(--dur-2) var(--ease), background var(--dur-2) var(--ease); }
  /* toast: small, smooth slide-up + fade — no spring/overshoot */
  .toast{ transform:translateX(-50%) translateY(6px); transition:opacity var(--dur-2) var(--ease), transform var(--dur-2) var(--ease); }
  .toast.show{ transform:translateX(-50%) translateY(0); }
  /* ---- LOADING STATES ---- */
  .skeleton{ position:relative; overflow:hidden; background:#eceaf4; border-radius:10px; }
  .skeleton::after{ content:""; position:absolute; inset:0; transform:translateX(-100%);
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent); animation:skshimmer 1.25s ease-in-out infinite; }
  @keyframes skshimmer{ 100%{ transform:translateX(100%);} }
  .sk-line{ height:12px; margin:9px 0; border-radius:7px; }
  .sk-title{ height:16px; width:55%; margin:0 0 14px; border-radius:8px; }
  .sk-card{ padding:16px; }
  .spinner{ display:inline-block; width:18px; height:18px; border-radius:50%;
    border:2.5px solid rgba(117,138,198,.28); border-top-color:var(--peri-deep);
    animation:spin .7s linear infinite; vertical-align:-3px; }
  .spinner.lg{ width:30px; height:30px; border-width:3px; }
  @keyframes spin{ to{ transform:rotate(360deg);} }
  .loading-row{ display:inline-flex; align-items:center; gap:9px; color:var(--ink-soft); font-size:13px; }
  /* keep a usable, non-"frozen-mid-spin" cue when motion is off — a uniform faint ring */
  @media (prefers-reduced-motion:reduce){ .skeleton{ background:#e7e4f0; } .spinner{ border-color:rgba(117,138,198,.5); opacity:.75; } }
  body.calm .skeleton{ background:#e7e4f0; }
  body.calm .spinner{ border-color:rgba(117,138,198,.5); }
  /* ---- EMPTY STATE ---- */
  .empty{ text-align:center; padding:28px 18px; color:var(--ink-soft); }
  .empty .empty-emoji{ font-size:30px; display:block; margin-bottom:8px; opacity:.92; }
  .empty .empty-title{ font-family:var(--display); font-size:15px; color:var(--ink); margin-bottom:4px; }
  .empty .empty-msg{ font-size:12.5px; max-width:34ch; margin:0 auto 12px; line-height:1.55; }
  .boot-sk{ max-width:1320px; margin:0 auto; padding:18px; display:flex; flex-direction:column; gap:16px; }
  /* ---- PROGRESS (accessible target meters) ---- */
  .progress{ display:block; }
  .progress-head{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:6px; }
  .progress-label{ font-size:12.5px; color:var(--ink-soft); font-weight:600; }
  .progress-val{ font-size:11.5px; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; }
  .progress-val b{ color:var(--ink); font-weight:700; }
  .progress-track{ position:relative; height:9px; border-radius:99px; background:var(--line); overflow:hidden; }
  .progress-fill{ position:absolute; top:0; bottom:0; left:0; border-radius:99px;
    background:linear-gradient(90deg,var(--peri),var(--peri-deep)); transition:width var(--dur-3) var(--ease); }
  .progress.tone-mint .progress-fill{ background:linear-gradient(90deg,var(--mint),#4fae93); }
  .progress.tone-sak  .progress-fill{ background:linear-gradient(90deg,var(--sakura),var(--sakura-deep)); }
  .progress.tone-lav  .progress-fill{ background:linear-gradient(90deg,var(--lav),var(--lav-deep)); }
  .progress.tone-peach .progress-fill{ background:linear-gradient(90deg,#f7c39a,var(--peach)); }
  .progress.is-complete .progress-fill{ background:linear-gradient(90deg,var(--mint),#4fae93); }
  .progress.is-over .progress-track{ box-shadow:inset 0 0 0 1.5px var(--peach); }
  .progress.is-over .progress-fill{ background:linear-gradient(90deg,var(--peach),#e0824f); }
  .progress.is-indeterminate .progress-fill{ width:35%!important; animation:progslide 1.15s ease-in-out infinite; }

  @media (prefers-reduced-motion:reduce){ .progress.is-indeterminate .progress-fill{ animation:none; left:0; } }
  body.calm .progress.is-indeterminate .progress-fill{ animation:none; left:0; }
  /* ---- STAT (metric card body) ---- */
  .stat{ display:flex; flex-direction:column; gap:2px; }
  .stat-label{ display:flex; align-items:center; gap:6px; font-size:11px; letter-spacing:.03em;
    text-transform:uppercase; color:var(--muted); font-weight:700; }
  .stat-main{ display:flex; align-items:baseline; gap:7px; flex-wrap:wrap; }
  .stat-value{ font-family:var(--display); font-size:clamp(22px,4.5vw,28px); line-height:1.05;
    color:var(--ink); font-variant-numeric:tabular-nums; }
  .stat-unit{ font-size:13px; color:var(--ink-soft); font-weight:600; }
  .stat-delta{ display:inline-flex; align-items:center; gap:3px; font-size:12px; font-weight:700;
    padding:2px 8px; border-radius:99px; background:var(--panel-soft); color:var(--ink-soft); font-variant-numeric:tabular-nums; }
  .stat-delta.is-good{ background:rgba(111,195,171,.16); color:#3f9e83; }
  .stat-delta.is-bad{ background:rgba(243,169,120,.20); color:#cf7637; }
  .stat-delta.is-flat{ background:var(--line); color:var(--muted); }
  .stat-hint{ font-size:11.5px; color:var(--muted); margin-top:3px; line-height:1.4; }
  /* ---- SWITCH (accessible toggle) ---- */
  .switch-row{ display:flex; align-items:center; justify-content:space-between; gap:14px; }
  .switch-text{ display:flex; flex-direction:column; gap:1px; min-width:0; }
  .switch-label{ font-size:13.5px; color:var(--ink); font-weight:600; }
  .switch-hint{ font-size:11.5px; color:var(--muted); line-height:1.4; }
  .switch{ position:relative; flex:0 0 auto; width:46px; height:27px; border-radius:99px; border:none;
    cursor:pointer; padding:0; background:var(--line); transition:background var(--dur-2) var(--ease);
    -webkit-tap-highlight-color:transparent; }
  .switch::after{ content:""; position:absolute; top:3px; left:3px; width:21px; height:21px; border-radius:50%;
    background:#fff; box-shadow:var(--shadow-sm); transition:transform var(--dur-2) var(--ease-spring); }
  .switch[aria-checked="true"]{ background:linear-gradient(90deg,var(--peri),var(--peri-deep)); }
  .switch[aria-checked="true"]::after{ transform:translateX(19px); }
  .switch[aria-disabled="true"]{ opacity:.5; cursor:not-allowed; }
  /* ---- RESPONSIVE REFINEMENTS (mobile · tablet · desktop) ---- */
  .hero-title h1{ font-size:clamp(20px,5vw,30px); }
  @media (min-width:641px) and (max-width:1040px){ main{ padding:20px; } }   /* tablet breathing room */
  @media (max-width:560px){
    /* phone tab bar scrolls sideways instead of stacking into several rows */
    #nav{ width:100%; flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; padding-bottom:2px; scroll-snap-type:x proximity; }
    #nav::-webkit-scrollbar{ display:none; }
    #nav .tab{ flex:0 0 auto; scroll-snap-align:start; }
    #rail{ padding:8px 14px; } main{ padding:14px; } .panel{ padding:14px; }
  }
  @media (pointer:coarse){   /* generous touch targets for small controls */
    .tab{ padding:8px 14px; }
    .chip{ min-height:34px; display:inline-flex; align-items:center; }
    .x{ min-width:34px; min-height:34px; display:inline-flex; align-items:center; justify-content:center; }
    .seg button{ padding:8px 13px; }
  }
  /* ---- iPHONE-MINIMAL MOTION (overrides the bolder entrance/press animations above):
     small distances, quick, smooth ease-out — no overshoot, no big stagger. Redefining
     these keyframes by name replaces the earlier versions globally. ---- */
  @keyframes viewFade{ from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }
  @keyframes panelIn{ from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
  @keyframes softPop{ from{opacity:0;transform:translateY(3px) scale(.99)} to{opacity:1;transform:none} }
  #view.anim{ animation:viewFade .24s var(--ease) both; }
  #view.anim>*{ animation:panelIn .26s var(--ease) both; }
  #view.anim>*:nth-child(2){ animation-delay:.02s }
  #view.anim>*:nth-child(3){ animation-delay:.04s }
  #view.anim>*:nth-child(4){ animation-delay:.05s }
  #view.anim>*:nth-child(n+5){ animation-delay:.06s }
  .modal{ animation:softPop .2s var(--ease); }
  #kikoChat:not(.hidden){ animation:softPop .2s var(--ease); }
  .modal-bg{ animation:fadeIn .14s ease; }
  /* gentler, quicker press feedback (was scale .95–.96) */
  .btn:active,.btn-grad:active{ transform:scale(.98); }
  .tab:active{ transform:scale(.97); }
  .scale button:active,.chiptog:active,.sitebtn:active{ transform:scale(.97); }
  .pill{ transition:none; }
  /* mode swap: smaller, quicker fade (was a 10px slide + scale over .45s) */
  @keyframes modeSwap{ from{opacity:0;transform:translateY(5px);} to{opacity:1;transform:none;} }
  #view.mode-anim{ animation:modeSwap .26s var(--ease) both; }
  /* ---- Kiko chat: free corner resize, sticky-note style (desktop/iPad — mobile is a bottom sheet) ---- */
  #kikoChat .kiko-log{ height:auto; max-height:none; }   /* let the log flex so the window's real height is the size */
  @media (min-width:641px){ #kikoChat{ max-height:none; } }   /* desktop/iPad: the inline free-resized height controls the size (mobile keeps its sheet cap) */
  .kchat-grip{ position:absolute; left:0; top:0; width:30px; height:30px; z-index:6; cursor:nwse-resize;
    touch-action:none; -webkit-touch-callout:none; border-radius:18px 0 0 0;
    background:linear-gradient(135deg, rgba(95,116,180,.34) 46%, transparent 46%); }
  .kchat-grip::after{ content:"⤡"; position:absolute; left:5px; top:3px; font-size:11px; color:#fff; opacity:.95; }
  @media (hover:hover){ .kchat-grip:hover{ background:linear-gradient(135deg, rgba(95,116,180,.58) 46%, transparent 46%); } }
  @media (max-width:640px){ .kchat-grip{ display:none; } }
  /* ---- Media library (Memories tab) ---- */
  .md-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; }
  .md-tile{ position:relative; border:1px solid var(--line); border-radius:12px; overflow:hidden; background:var(--panel-soft); }
  .md-tile>img{ width:100%; height:120px; object-fit:cover; display:block; cursor:zoom-in; }
  .md-tools{ position:absolute; top:4px; right:4px; display:flex; gap:4px; }
  .md-tools .x{ background:rgba(255,255,255,.88); border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; font-size:12px; box-shadow:var(--shadow-sm); }
  .md-cap{ font-size:11px; padding:5px 8px; border:none; border-top:1px solid var(--line); border-radius:0; width:100%; background:#fff; }
  .md-cap:focus{ box-shadow:none; outline:2px solid var(--peri); outline-offset:-2px; }
  .md-people{ display:flex; flex-wrap:wrap; gap:3px; padding:5px; }
  .md-pchip{ font-size:9.5px; padding:2px 7px; border-radius:999px; border:1.5px solid var(--line-2); background:#fff; color:var(--muted); }
  .md-pchip.on{ background:#fde2f2; border-color:var(--sakura); color:var(--sakura-deep); }
  /* ---- Digital Hobonichi daily page ---- */
  .jr-page{ border-top:4px solid var(--jr-accent,#8AB1CA); background:linear-gradient(180deg,#fffdf9,#fff); }
  .jr-page-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  .jr-page-wd{ font-family:var(--display); font-size:13px; color:var(--jr-ink,#638AA4); letter-spacing:.05em; text-transform:uppercase; }
  .jr-page-date{ font-family:var(--display); font-size:19px; color:var(--ink); line-height:1.1; }

  .jr-glance-h{ font-size:11px; font-weight:700; color:var(--jr-ink,#638AA4); letter-spacing:.04em; margin-bottom:4px; }

/* ============================================================================
   UI — reusable, accessible component helpers (vanilla; each returns an HTML string).
   "Props" are a single options object. The CSS Foundation lifts existing markup
   automatically; these standardise loading/empty states and new controls.
   Docs: UI-COMPONENTS.md at the project root.
   ============================================================================ */
const _dataAttrs = d => d ? Object.entries(d).map(([k,v])=>` data-${esc(k)}="${esc(String(v))}"`).join("") : "";
/* tidy numeric formatting for meters/stats: 80.9 → "80.9", 110 → "110", 0.50 → "0.5" */
const _num = n => { const x = Number(n); if (!isFinite(x)) return "0"; return (Math.round(x*100)/100).toString(); };
const UI = {
  /* spinner({size:'sm'|'lg', label?}) — inline, announced to screen readers */
  spinner({ size, label } = {}) {
    return `<span class="loading-row" role="status" aria-live="polite"><span class="spinner${size==="lg"?" lg":""}" aria-hidden="true"></span>${label?`<span>${esc(label)}</span>`:`<span class="sr-only">Loading</span>`}</span>`;
  },
  /* skeleton({lines=3, width?}) — shimmer placeholder lines */
  skeleton({ lines = 3, width } = {}) {
    let h = ""; for (let i=0;i<lines;i++){ const w = i===lines-1 ? "70%" : (width||"100%"); h += `<div class="skeleton sk-line" style="width:${w}"></div>`; }
    return `<div aria-hidden="true">${h}</div>`;
  },
  /* skeletonCard({lines=3}) — a panel-shaped loading placeholder */
  skeletonCard({ lines = 3 } = {}) {
    return `<div class="panel sk-card" aria-busy="true" aria-hidden="true"><div class="skeleton sk-title"></div>${UI.skeleton({ lines })}</div>`;
  },
  /* empty({emoji,title,msg?,action?:{label,act,data?,variant?}}) — friendly empty state */
  empty({ emoji = "❄️", title = "Nothing here yet", msg = "", action } = {}) {
    const btn = action ? `<button class="btn${action.variant==="primary"?" btn-grad":""}" data-act="${esc(action.act)}"${_dataAttrs(action.data)}>${esc(action.label)}</button>` : "";
    return `<div class="empty"><span class="empty-emoji" aria-hidden="true">${emoji}</span><div class="empty-title">${esc(title)}</div>${msg?`<div class="empty-msg">${esc(msg)}</div>`:""}${btn}</div>`;
  },
  /* button({label,variant:'primary'|'ghost',icon?,act?,data?,ariaLabel?,loading?,disabled?}) */
  button({ label, variant = "ghost", icon, act, data, ariaLabel, loading, disabled } = {}) {
    const cls = variant === "primary" ? "btn btn-grad" : "btn";
    const inner = loading ? `<span class="spinner" aria-hidden="true"></span> ${esc(label||"")}` : `${icon?icon+" ":""}${esc(label||"")}`;
    return `<button class="${cls}"${act?` data-act="${esc(act)}"`:""}${_dataAttrs(data)}${ariaLabel?` aria-label="${esc(ariaLabel)}"`:""}${disabled?" disabled aria-disabled=\"true\"":""}${loading?" aria-busy=\"true\"":""}>${inner}</button>`;
  },
  /* iconButton({icon,act,data?,ariaLabel,title?}) — icon-only control (label is required for a11y) */
  iconButton({ icon, act, data, ariaLabel, title } = {}) {
    return `<button class="x" data-act="${esc(act)}"${_dataAttrs(data)} aria-label="${esc(ariaLabel||title||"")}"${title?` title="${esc(title)}"`:""}>${icon}</button>`;
  },
  /* pill({text, tone:'peri'|'sak'|'lav'|'mint'|'ice'|'gray'}) */
  pill({ text, tone = "gray" } = {}) { return `<span class="pill pill-${tone}">${esc(text)}</span>`; },
  /* field({label,id?,control,hint?}) — labelled form-control wrapper */
  field({ label, id, control, hint } = {}) {
    return `<div class="field">${label?`<label class="label"${id?` for="${esc(id)}"`:""}>${esc(label)}</label>`:""}${control||""}${hint?`<div class="soft" style="font-size:11px;margin-top:4px">${esc(hint)}</div>`:""}</div>`;
  },
  /* progress({value,max=100,label?,tone?:'peri'|'mint'|'sak'|'lav'|'peach',unit?,showValue=true,valueText?,indeterminate?})
     Accessible target meter (role=progressbar). Clamps value, handles over-target,
     completion, max<=0 / NaN (→ indeterminate), and exposes a human aria-valuetext. */
  progress({ value = 0, max = 100, label, tone = "peri", unit = "", showValue = true, valueText, indeterminate = false } = {}) {
    const m = Number(max) > 0 ? Number(max) : 0;
    let v = Number(value); if (!isFinite(v)) v = 0;
    const safeV = Math.max(0, v);
    const ind = indeterminate || m === 0;                       // unknown total → indeterminate bar
    const pct = ind ? 35 : Math.max(0, Math.min(100, (safeV / m) * 100));
    const over = !ind && v > m;                                 // exceeded the target
    const complete = !ind && !over && pct >= 100;
    const u = unit ? esc(unit) : "";
    const cls = `progress tone-${esc(tone)}${over?" is-over":""}${complete?" is-complete":""}${ind?" is-indeterminate":""}`;
    const headRight = (showValue && !ind)
      ? `<span class="progress-val"><b>${esc(_num(safeV))}</b>${u} / ${esc(_num(m))}${u}</span>` : "";
    const head = (label || headRight)
      ? `<div class="progress-head">${label?`<span class="progress-label">${esc(label)}</span>`:"<span></span>"}${headRight}</div>` : "";
    const human = valueText || (ind ? "Loading" : `${_num(safeV)}${unit?" "+unit:""} of ${_num(m)}${unit?" "+unit:""}`);
    const aria = ind
      ? `role="progressbar" aria-label="${esc(label||"Loading")}"`
      : `role="progressbar" aria-valuenow="${esc(_num(safeV))}" aria-valuemin="0" aria-valuemax="${esc(_num(m))}" aria-valuetext="${esc(human)}"${label?` aria-label="${esc(label)}"`:""}`;
    return `<div class="${cls}">${head}<div class="progress-track" ${aria}><div class="progress-fill" style="width:${pct}%"></div></div></div>`;
  },
  /* stat({label,value,unit?,delta?,deltaText?,good?:'up'|'down',icon?,hint?,loading?})
     Metric card body — value + optional trend chip. `good` says which direction is
     positive (e.g. weight → 'down'), colouring the delta green/amber; omit for neutral.
     A screen-reader phrase ("decreased") is attached so the arrow isn't the only cue. */
  stat({ label, value, unit, delta, deltaText, good, icon, hint, loading } = {}) {
    if (loading) {
      return `<div class="stat" aria-busy="true" aria-label="Loading ${esc(label||"stat")}"><div class="skeleton sk-line" style="width:42%;height:11px;margin:2px 0"></div><div class="skeleton" style="width:64%;height:26px;border-radius:9px;margin:8px 0 4px"></div></div>`;
    }
    let deltaHtml = "";
    if (delta !== undefined && delta !== null && delta !== "") {
      const dn = Number(delta);
      const dir = !isFinite(dn) ? "flat" : dn > 0 ? "up" : dn < 0 ? "down" : "flat";
      const tone = dir === "flat" ? "is-flat" : (good && good === dir) ? "is-good" : good ? "is-bad" : "";
      const arrow = dir === "up" ? "↑" : dir === "down" ? "↓" : "→";
      const shown = deltaText || (isFinite(dn) ? `${dn>0?"+":""}${_num(dn)}${unit?" "+unit:""}` : String(delta));
      const sr = dir === "up" ? "increased" : dir === "down" ? "decreased" : "no change";
      deltaHtml = `<span class="stat-delta ${tone}"><span aria-hidden="true">${arrow}</span>${esc(shown)}<span class="sr-only"> (${sr})</span></span>`;
    }
    return `<div class="stat"><span class="stat-label">${icon?`<span aria-hidden="true">${esc(icon)}</span>`:""}${esc(label||"")}</span>`
      + `<span class="stat-main"><span class="stat-value">${esc(value==null||value===""?"—":String(value))}</span>${unit?`<span class="stat-unit">${esc(unit)}</span>`:""}${deltaHtml}</span>`
      + `${hint?`<span class="stat-hint">${esc(hint)}</span>`:""}</div>`;
  },
  /* toggle({label?,on,act,data?,hint?,disabled?,ariaLabel?}) — accessible switch.
     Native <button role="switch"> ⇒ Space/Enter work for free; flip state in the
     data-act handler and re-render. Always carries an accessible name. */
  toggle({ label, on = false, act, data, hint, disabled, ariaLabel } = {}) {
    const name = ariaLabel || label || "toggle";
    const sw = `<button type="button" class="switch" role="switch" aria-checked="${on?"true":"false"}" aria-label="${esc(name)}"`
      + `${act?` data-act="${esc(act)}"`:""}${_dataAttrs(data)}${disabled?` disabled aria-disabled="true"`:""}></button>`;
    if (!label && !hint) return sw;
    return `<div class="switch-row"><span class="switch-text"><span class="switch-label">${esc(label||"")}</span>${hint?`<span class="switch-hint">${esc(hint)}</span>`:""}</span>${sw}</div>`;
  },
};

/* ===================== UNDO (Ctrl/⌘+Z rolls back the last data change — persists across reloads) ===================== */
let UNDO=[]; const UNDO_MAX=50; let UNDO_RESTORING=false; const UNDO_KEY="mifu-undo";
function _saveUndoNow(){ try{ let arr=UNDO.slice(-25);   // keep recent history small enough for localStorage
  while(arr.length){ try{ localStorage.setItem(UNDO_KEY,JSON.stringify(arr)); return; }catch(e){ arr=arr.slice(1); } }
  localStorage.removeItem(UNDO_KEY);
}catch(e){} }
// PERF: each action used to JSON.stringify the whole 25-snapshot undo stack synchronously — heavy and
// growing with her data. Coalesce those writes onto a short debounce (undo still works instantly in
// memory), and flush on pagehide so nothing is lost when the tab/app closes.
let _undoSaveT=null;
function saveUndo(){ if(_undoSaveT) return; _undoSaveT=setTimeout(()=>{ _undoSaveT=null; _saveUndoNow(); },400); }
addEventListener("pagehide",()=>{ if(_undoSaveT){ clearTimeout(_undoSaveT); _undoSaveT=null; } _saveUndoNow(); });
function loadUndo(){ try{ const s=localStorage.getItem(UNDO_KEY); if(s){ const a=JSON.parse(s); if(Array.isArray(a)) UNDO=a; } }catch(e){} }
loadUndo();
async function undoLast(){
  if(!UNDO.length){ toast("nothing to undo ❄️"); return; }
  const {date,prev}=UNDO.pop(); saveUndo(); const snap=JSON.parse(JSON.stringify(prev||{}));
  UNDO_RESTORING=true;
  try{
    if(DEMO){ demo[date]=snap; }
    else if(SB){ await SB.from("daily_logs").upsert({user_id:UID,date,notes:snap},{onConflict:"user_id,date"}); }
    if(date===SENTINEL) state.sentinel=JSON.parse(JSON.stringify(snap));
    else if(date===TODAY) state.today=JSON.parse(JSON.stringify(snap));
    else { state._loaded=false; await loadData(); }   // some other day's row → refresh from DB
  }catch(e){ console.error(e); }
  UNDO_RESTORING=false;
  try{ await render(); }catch(_){ try{ renderStickies(); }catch(__){} }
  toast("undone ↩️");
}

/* ===================== DATA LAYER ===================== */
const DB = {
  async daily(date){
    if(DEMO) return JSON.parse(JSON.stringify(demo[date]||{}));
    if(!SB) return {};                       // not connected yet — show empty, re-render once SB ready
    const {data}=await SB.from("daily_logs").select("notes").eq("user_id",UID).eq("date",date).maybeSingle();
    return (data&&data.notes)||{};
  },
  async saveDaily(date,merge){
    // PERF: the two hot rows (sentinel + today) are always kept current in memory, and any
    // external write (Kiko agent, scale sync) triggers a full loadData(). So for those we merge
    // against the cached copy instead of doing a network SELECT before every save — that removes
    // one round-trip from every toggle/log. We clone first so a mutating merge can't corrupt
    // state, and snapshot `prev` BEFORE merging so undo always captures the pre-change value.
    const cached = (!DEMO && SB) ? (date===SENTINEL ? state.sentinel : (date===TODAY ? state.today : null)) : null;
    const cur = cached ? JSON.parse(JSON.stringify(cached||{})) : await DB.daily(date);
    const prev = JSON.parse(JSON.stringify(cur||{}));
    const next=merge({...cur});
    if(!UNDO_RESTORING){ try{ UNDO.push({date, prev}); if(UNDO.length>UNDO_MAX) UNDO.shift(); saveUndo(); }catch(e){} }
    // Keep the in-memory copy of the two hot rows current so back-to-back saves (e.g. an agent
    // running several actions) always merge against the latest value — not just the callers that
    // remember to assign the return. This is what makes the cache-as-base path above safe.
    if(date===SENTINEL) state.sentinel=next; else if(date===TODAY) state.today=next;
    if(DEMO){ demo[date]=next; return next; }
    if(!SB) return next;
    await SB.from("daily_logs").upsert({user_id:UID,date,notes:next},{onConflict:"user_id,date"});
    return next;
  },
  async range(days){
    if(DEMO) return Object.entries(demo).filter(([d])=>d!==SENTINEL).map(([date,notes])=>({date,notes}));
    if(!SB) return [];
    const since=dayAgo(-days);
    const {data}=await SB.from("daily_logs").select("date,notes").eq("user_id",UID).gte("date",since).neq("date",SENTINEL);
    return (data||[]).map(r=>({date:r.date,notes:r.notes||{}}));
  },
  async exportAll(){
    if(DEMO) return Object.entries(demo).map(([date,notes])=>({date,notes}));
    if(!SB) return [];
    const {data}=await SB.from("daily_logs").select("*").eq("user_id",UID); return data||[];
  }
};

function layoutHome(){

  let colCount=0;
  try{ colCount=(((getComputedStyle(grid).gridTemplateColumns)||"").match(/\S+/g)||[]).length; }catch(e){}
  if(!colCount) colCount=Math.max(3,Math.min(24,Math.floor((grid.clientWidth+gap)/(72+gap))));

    if(w.classList.contains("resizing"))return;             // never fight a live resize drag

/* ===== On This Day — gentle date-anchored memory resurfacing (Idea #14) =====
   Reads the shared buildMemoryIndex() and surfaces past memories that fall on
   today's anniversary or in soft windows (last week / two weeks / a month / ~a year).
   Pure read — no new storage; anything pushed into the memory index appears here free. */
function onThisDayPicks(){
  let idx; try{ idx=buildMemoryIndex(); }catch(e){ return []; }
  if(!idx||!idx.length) return [];
  const now=new Date(TODAY+"T00:00"); if(isNaN(now)) return [];
  const tY=now.getFullYear(), tM=now.getMonth(), tD=now.getDate(), t0=now.getTime();
  const out=[], seen=new Set();
  const add=(m,when,rank)=>{ if(!m||!m.id||seen.has(m.id))return; seen.add(m.id); out.push({m,when,rank}); };
  idx.forEach(m=>{
    const dt=new Date(String(m.date)+"T00:00"); if(isNaN(dt))return;
    const diff=Math.round((t0-dt.getTime())/86400000); if(diff<1)return;          // past only
    if(dt.getMonth()===tM && dt.getDate()===tD){                                  // exact anniversary
      const ya=tY-dt.getFullYear(); add(m, ya<=1?"One year ago today":`${ya} years ago today`, 0); return; }
    if(diff>=5 && diff<=9)         add(m,"Last week",2);
    else if(diff>=12 && diff<=16)  add(m,"Two weeks ago",3);
    else if(diff>=26 && diff<=34)  add(m,"A month ago",4);
    else if(diff>=355 && diff<=375) add(m,"About a year ago",5);
  });
  out.sort((a,b)=>a.rank-b.rank);   // anniversaries first; index is already newest-first within a rank
  return out;
}

function cycleStats(cyc){
  const h=(cyc.history||[]).filter(x=>x&&x.start).slice().sort((a,b)=>a.start<b.start?-1:1);
  const gaps=[]; for(let i=1;i<h.length;i++) gaps.push(daysBetween(h[i-1].start,h[i].start));
  const lens=h.filter(x=>x.end).map(x=>Math.max(1,daysBetween(x.start,x.end)+1));
  const avg=a=>a.length?Math.round(a.reduce((p,c)=>p+c,0)/a.length):null;
  const withGap=h.map((x,i)=>({...x, gap:i>0?daysBetween(h[i-1].start,x.start):null}));
  return { h:withGap, count:h.length, gaps, avgGap:avg(gaps), minGap:gaps.length?Math.min(...gaps):null, maxGap:gaps.length?Math.max(...gaps):null, avgLen:avg(lens) };
}

  else R.push("No periods logged.");

  const pcLines=pcKeys.map(([k,l])=>{ const vals=[]; for(let i=0;i<range;i++){ const d=dayAgo(-i); const v=byDate[d]&&byDate[d].pcos&&byDate[d].pcos[k]; if(v!=null)vals.push(v); } const a=avg(vals); return a!=null?`${l} ${a.toFixed(1)}/5`:null; }).filter(Boolean);

      ${st.count?`<details style="margin-top:8px;border:none;background:transparent;padding:0;box-shadow:none"><summary style="font-size:12px">📜 Period history (${st.count}) · tap ✕ to remove a mistaken log</summary>
        <div style="margin-top:6px">${st.h.slice().reverse().map(x=>`<div class="listrow"><span class="grow" style="font-size:12px">${fmtDate(x.start)}${x.end?` – ${fmtDate(x.end)}`:''} ${x.flow?`<span class="soft">· ${esc(x.flow)}</span>`:''}</span>${x.gap!=null?`<span class="soft" style="font-size:11px" title="days since previous">+${x.gap}d</span>`:''}<button class="x" data-act="delPeriod" data-start="${esc(x.start)}" data-end="${esc(x.end||'')}" title="remove this log">✕</button></div>`).join("")}</div></details>`:''}
    </div>
  </div></details>
  ${DISCLAIMER}`;
}

/* ===================== MOUNJARO ===================== */
function currentDose(){ const h=(state.sentinel.doseHistory||[]).slice().sort((a,b)=>a.started<b.started?-1:1); return h.length?h[h.length-1]:null; }

  const sites=CONFIG.mounjaro.sites; const i=sites.indexOf(last.site);
  const sug=sites[(i+1+Math.floor(sites.length/2))%sites.length];

}

  const nowW=wl.length?wl[wl.length-1].w:null;

  const lost=change!=null?-change:null;
  const lostStr=lost==null?"—":(Math.abs(lost)<0.05?"±0":(lost>0?"↓ ":"↑ ")+Math.abs(lost).toFixed(1)+" "+unit);

    ${scaleRow("Bloating / stomach pain","mjSet","belly",mj.belly)}

      ${chiptog("Protein with meals","mjToggle","proteinMeals",mj.proteinMeals)}

/* ===================== WEIGHT ===================== */
function rollingAvg(arr){ if(!arr.length)return null; const l=arr.filter(x=>x.w!=null).slice(-4); return l.length?l.reduce((a,b)=>a+b.w,0)/l.length:null; }
// everything the Withings Body Smart can report (manual entry + sync both use these keys)
const BODYCOMP=[["w","Weight",CONFIG.weightUnit,"⚖️"],["bmi","BMI","","📐"],["fat","Body fat","%","🫧"],["muscle","Muscle","kg","💪"],["bone","Bone","kg","🦴"],["water","Body water","%","💧"],["visceral","Visceral fat","","🎯"],["hr","Heart rate","bpm","💓"]];
function bcLatest(wl,k){ const ent=wl.filter(x=>x[k]!=null); if(!ent.length)return null; const last=ent[ent.length-1], prev=ent.length>1?ent[ent.length-2]:null; return {v:last[k], date:last.date, d:prev?Math.round((last[k]-prev[k])*10)/10:null}; }
function withBMI(wl){ // attach a derived bmi to entries that have weight + we know height
  const h=state.sentinel.heightCm; if(!h) return wl;
  return wl.map(x=> (x.w!=null && x.bmi==null) ? {...x, bmi: Math.round((x.w/Math.pow(h/100,2))*10)/10} : x);
}
const WT_COLORS={w:"#ef9ccb",bmi:"#9b8cf0",fat:"#f0869b",muscle:"#5fc59a",bone:"#c8a8ca",water:"#5ba6e8",visceral:"#f0b057",hr:"#7d83e6"};
function wtYRange(vs){ if(!vs.length)return null; let mn=Math.min(...vs),mx=Math.max(...vs); if(mn===mx){mn-=1;mx+=1;} const p=(mx-mn)*0.12||1; return {mn:mn-p,mx:mx+p}; }
function buildWeightChartSVG(keys,type){
  let wl=withBMI((state.sentinel.weightLog||[]).slice().sort(cmpDate));
  const r=state.wtRange||"all";
  if(r!=="all"){ const days=r==="30d"?30:r==="90d"?90:365; const cut=dayAgo(-days); wl=wl.filter(x=>x.date>=cut); }
  keys=(keys||["w"]).filter(k=>BODYCOMP.some(b=>b[0]===k)); if(!keys.length)keys=["w"];
  const single=keys.length===1;
  const W=600,H=230,padX=42,padT=18,padB=32,plotW=W-padX*2,plotH=H-padT-padB,base=padT+plotH;
  const ts=wl.map(x=>Date.parse(x.date+"T00:00")); const t0=ts.length?Math.min(...ts):0,t1=ts.length?Math.max(...ts):1; const tspan=Math.max(1,t1-t0);
  const xi=iso=> padX + (ts.length>1 ? (Date.parse(iso+"T00:00")-t0)/tspan*plotW : plotW/2);
  let grid=""; for(let g=0;g<=2;g++){ const yy=padT+g*(plotH/2); grid+=`<line x1="${padX}" y1="${yy.toFixed(0)}" x2="${W-padX}" y2="${yy.toFixed(0)}" stroke="#e7e2f2" stroke-width="1"/>`; }
  // y-axis labels: real numbers when one metric, low/high when several
  let ylab="", r0=null;
  if(single){ r0=wtYRange(wl.filter(x=>x[keys[0]]!=null).map(x=>x[keys[0]]));
    if(r0){ [[padT,r0.mx],[padT+plotH/2,(r0.mn+r0.mx)/2],[base,r0.mn]].forEach(([yy,val])=>{ ylab+=`<text x="${padX-8}" y="${(yy+4).toFixed(0)}" text-anchor="end" font-size="11" fill="#9b96b6">${Math.round(val*10)/10}</text>`; }); } }
  else { ylab=`<text x="${padX-8}" y="${(padT+9).toFixed(0)}" text-anchor="end" font-size="10.5" fill="#9b96b6">high</text><text x="${padX-8}" y="${base.toFixed(0)}" text-anchor="end" font-size="10.5" fill="#9b96b6">low</text>`; }
  let ticks=""; if(wl.length){ [...new Set([0,Math.floor(wl.length/2),wl.length-1])].forEach(i=>{ ticks+=`<text x="${xi(wl[i].date).toFixed(0)}" y="${H-8}" text-anchor="middle" font-size="11" fill="#9b96b6">${fmtDate(wl[i].date)}</text>`; }); }
  let defs="", body="";
  keys.forEach((k,ki)=>{
    const col=WT_COLORS[k]||"#9b8cf0"; const raw=wl.filter(x=>x[k]!=null); if(!raw.length)return;
    const rng = single ? r0 : wtYRange(raw.map(x=>x[k])); if(!rng)return;
    const yv=v=> padT + (1-((v-rng.mn)/(rng.mx-rng.mn)))*plotH;
    const pts=raw.map(x=>({x:xi(x.date),y:yv(x[k])}));
    if(single && type==="bars"){ const gid="wbg"+ki; defs+=`<linearGradient id="${gid}" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="${col}"/><stop offset="1" stop-color="${col}" stop-opacity=".5"/></linearGradient>`;
      const bw=Math.min(22,plotW/Math.max(1,pts.length)*0.6);
      pts.forEach(p=>{ const h=Math.max(2,base-p.y); body+=`<rect x="${(p.x-bw/2).toFixed(1)}" y="${p.y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="5" fill="url(#${gid})"/>`; });
    } else if(single && type==="dots"){
      pts.forEach(p=>{ body+=`<line x1="${p.x.toFixed(1)}" y1="${base}" x2="${p.x.toFixed(1)}" y2="${p.y.toFixed(1)}" stroke="${col}" stroke-width="2" opacity=".3"/><circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="5.5" fill="${col}"/>`; });
    } else {
      const fid="wfg"+ki; if(single)defs+=`<linearGradient id="${fid}" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="${col}" stop-opacity=".4"/><stop offset="1" stop-color="${col}" stop-opacity=".03"/></linearGradient>`;
      const path=pts.map(p=>`${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" L");
      if(single && pts.length) body+=`<path d="M${pts[0].x.toFixed(1)} ${base} L${path} L${pts[pts.length-1].x.toFixed(1)} ${base} Z" fill="url(#${fid})"/>`;
      if(pts.length>1) body+=`<path d="M${path}" fill="none" stroke="${col}" stroke-width="${single?3:2.4}" stroke-linecap="round" stroke-linejoin="round"/>`;
      pts.forEach(p=>{ body+=`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${single?3.5:3}" fill="#fff" stroke="${col}" stroke-width="2.2"/>`; });
    }
  });
  if(!wl.length) body=`<text x="${W/2}" y="${(base-plotH/2).toFixed(0)}" text-anchor="middle" font-size="12" fill="#b9b3cf">no entries in this range yet ❄️</text>`;
  return `<svg class="trchart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"><defs>${defs}</defs>${grid}${ylab}${body}${ticks}</svg>`;
}

function foodAllItems(days){ try{ const out=[]; foodHistory(days||120).forEach(h=>{ (h.meals||[]).forEach(it=>{ if(it&&it.name) out.push({...it,date:h.date}); }); }); return out; }catch(e){ return []; } }
function foodMealMemory(){
  const items=foodAllItems(120), norm=s=>String(s||"").toLowerCase().trim();
  const bucketOf=it=>{ try{ const h=it.time?new Date(it.time).getHours():13; return h<11?"breakfast":h<16?"lunch":h<21?"dinner":"snack"; }catch(e){ return "lunch"; } };
  const B={breakfast:{},lunch:{},dinner:{},snack:{}};
  items.forEach(it=>{ const b=bucketOf(it), k=norm(it.name); if(!k)return; const e=B[b][k]||(B[b][k]={name:it.name,n:0,kcal:0,protein:0,fiber:0,carbs:0,fat:0,serving:it.serving||""});
    e.n++; e.kcal=it.kcal||e.kcal; e.protein=it.protein||e.protein; e.fiber=it.fiber||e.fiber; e.carbs=it.carbs||e.carbs; e.fat=it.fat||e.fat; });
  const top=o=>Object.values(o).filter(e=>e.n>=2).sort((a,b)=>b.n-a.n).slice(0,4);
  return { breakfast:top(B.breakfast), lunch:top(B.lunch), dinner:top(B.dinner), snack:top(B.snack) };
}

  bits.push(tot.protein>=T.protein?`Protein goal hit (${Math.round(tot.protein)}/${T.protein}g) — lovely. 💪`:`Protein's at ${Math.round(tot.protein)}/${T.protein}g — about ${Math.round(T.protein-tot.protein)}g to go. A shake or yogurt would close it.`);
  if(tot.fiber<T.fiber) bits.push(`Fibre's a little behind (${Math.round(tot.fiber)}/${T.fiber}g) — fruit or veg with dinner would likely finish it.`);

function foodInsights(){
  const out=[], fh=foodHistory(14).filter(h=>h.meals&&h.meals.length), T=foodTargets();

  if(streak>=3) out.push(`You've hit your protein goal ${streak} days running — strong week.`);

  "Let's gather your year together 🦊 First — do you have your total earnings for each income source? Twitch payouts, YouTube/AdSense, sponsorships & brand deals (including anything paid in product), donations/tips, merch, and affiliate. 💰",
  "Now expenses — have you collected the receipts/invoices for your business costs? Gear, software & subscriptions, the business share of internet & phone, home-office, work travel, games bought as content, marketing, and bank & accountant fees. 🧾",

];
function eur(n){ return "€"+(Math.round((+n||0)*100)/100).toFixed(2); }
function moneyYear(){ return state.moneyYear||String(new Date().getFullYear()); }
function moneyEntries(year){ return (state.sentinel.money||[]).filter(t=>String(t.date||"").slice(0,4)===year); }
function csvCell(s){ s=String(s==null?"":s); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }
function downloadFile(name,content,mime){ try{ const b=new Blob([content],{type:mime||"text/plain"}); const u=URL.createObjectURL(b); const a=document.createElement("a"); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1500); }catch(e){ toast("couldn't export — try again"); } }
function moneySummaryText(year){
  const tx=moneyEntries(year); const inc=tx.filter(t=>t.dir==="in").reduce((a,t)=>a+(+t.amount||0),0); const exp=tx.filter(t=>t.dir==="out").reduce((a,t)=>a+(+t.amount||0),0);
  const catLines=(dir,cats)=>cats.map(c=>{ const s=tx.filter(t=>t.dir===dir&&t.cat===c).reduce((a,t)=>a+(+t.amount||0),0); return s>0?`   ${c}: ${eur(s)}`:""; }).filter(Boolean).join("\n");
  const q=[1,2,3,4].map(qi=>{ const inq=tx.filter(t=>{const mo=+String(t.date).slice(5,7);return Math.ceil(mo/3)===qi;}); const in_=inq.filter(t=>t.dir==="in").reduce((a,t)=>a+(+t.amount||0),0); const out_=inq.filter(t=>t.dir==="out").reduce((a,t)=>a+(+t.amount||0),0); return `   Q${qi}: income ${eur(in_)} · expenses ${eur(out_)}`; }).join("\n");
  const tp=(state.sentinel.taxPrep||{})[year];
  return `MIFUYU — TAX SUMMARY ${year}\n(eenmanszaak / sole proprietor · content creation · Netherlands)\n\n`
    +`TOTAL INCOME:   ${eur(inc)}\nTOTAL EXPENSES: ${eur(exp)}\nNET PROFIT:     ${eur(inc-exp)}\n\n`
    +`INCOME BY CATEGORY:\n${catLines("in",MONEY_IN)||"   (none)"}\n\nEXPENSES BY CATEGORY:\n${catLines("out",MONEY_OUT)||"   (none)"}\n\nPER QUARTER (for BTW):\n${q}\n\n`
    +(tp&&tp.items&&tp.items.length?`TAX-PREP CHECKLIST:\n${tp.items.map(x=>`• ${x.q}\n   → ${x.a}`).join("\n\n")}\n\n`:"")
    +`Note: figures from Mifuyu OS; please verify against bank/platform statements with your accountant.\n`;
}

function viewMoney(){

    <details class="acc"><summary>📖 Netherlands tax guide — sole-proprietor creator</summary><div class="acc-body">
      <p style="font-size:13px;line-height:1.65">You run an <b>eenmanszaak</b> (sole proprietorship), so your business profit is taxed as your personal income in <b>Box 1</b> (inkomstenbelasting). Nothing is withheld for you, so put money aside through the year.</p>
      <p style="font-size:13px;line-height:1.65"><b>BTW (VAT):</b> the standard rate is 21%, and you normally file a BTW return <b>each quarter</b>. If your turnover stays under the KOR threshold (around €20,000/yr) you can join the <b>kleineondernemersregeling</b> and stop charging/filing VAT — your accountant can say which is better for you.</p>

    <details class="acc"><summary>Is this private? Who can see my stuff?</summary><div class="acc-body"><p style="font-size:12.5px;line-height:1.65">It's a single-user app made just for you. Your data lives in <b>your own database</b> (a private Supabase project Eggie set up) — no accounts, no analytics, no tracking, no one else on it. The page itself is just an unlisted link. If you ever want a password on top, there's an optional auth lock we can switch on.</p></div></details>

    <details class="acc"><summary>Does anything ever leave the app?</summary><div class="acc-body"><p style="font-size:12.5px;line-height:1.65">Only when you use the features that need it, and only the minimum: AI things (Kiko's chat, food photos, scripts, the journal <i>write-up</i>) send that text/photo to Claude through our own server function — the API key never touches your browser. Kiko's web searches go through the same AI. Reminder emails &amp; Kiko's weekly letter go through the email service, only if you turned those on. The journal <i>questions</i> and the tax checklist run entirely on-page. That's the whole list.</p></div></details>
    <details class="acc"><summary>I made a mistake — can I fix it?</summary><div class="acc-body"><p style="font-size:12.5px;line-height:1.65">Always. <b>Ctrl+Z / ⌘Z</b> undoes your last data changes — even after you've closed the page and come back. You can also just tell Kiko "undo that." Most lists have a ✕ (including period history), every page layout has a reset, and the 🔒 chip freezes layouts so nothing moves by accident.</p></div></details>

/* ===================== PLANNER ===================== */
const TASK_BUCKETS=[["personal","💜","Personal"],["health","💊","Health & appts"],["content","🎬","Content"],["hobbies","🎨","Hobbies"],["someday","🌙","Someday / maybe"]];
const TASK_SPOONS=[["low","🌙","Low"],["some","🌤","Some"],["full","🌞","Full"]];
function spoonMeta(s){ return TASK_SPOONS.find(x=>x[0]===s)||TASK_SPOONS[1]; }
/* ---- planner upgrades: status board, sorting lens, due dates, linked reminders ---- */
const TASK_STATUSES=[["todo","🌱 To do"],["doing","🔆 Doing"],["done","✅ Done"]];
function taskStatus(t){ return t.status||(t.done?"done":"todo"); }
function remByTask(){ const m={}; (state.sentinel.customReminders||[]).forEach(r=>{ if(r.taskId&&!r.done) m[r.taskId]=r; }); return m; }
function sortTasks(arr){
  const m=state.boardSort||"custom"; if(m==="custom")return arr;          // the lens never rearranges her saved order
  const bIdx=k=>{ const i=TASK_BUCKETS.findIndex(b=>b[0]===k); return i<0?99:i; };
  const sIdx={low:0,some:1,full:2};                                       // gentle wins float up on hard days
  return arr.slice().sort((a,b)=>{
    if(m==="bucket"){ const d=bIdx(a.bucket)-bIdx(b.bucket); if(d)return d; return String(a.due||"9999").localeCompare(String(b.due||"9999")); }
    if(m==="due") return String(a.due||"9999-99").localeCompare(String(b.due||"9999-99"));
    if(m==="spoon"){ const d=((sIdx[a.spoon]??1)-(sIdx[b.spoon]??1)); if(d)return d; return String(a.due||"9999").localeCompare(String(b.due||"9999")); }
    return 0; });
}
function duePill(t){
  if(!t.due)return "";
  const diff=Math.ceil((new Date(t.due+"T00:00")-new Date(TODAY+"T00:00"))/86400000);
  if(t.done)return `<span class="pill pill-gray">📅 ${esc(t.due.slice(5))}</span>`;          // done = calm gray, no shaming
  if(diff<0)return `<span class="pill" style="background:#fde4e4;color:#c0566a">📅 ${-diff}d late</span>`;
  if(diff===0)return `<span class="pill" style="background:#fdebd9;color:#b4764a">📅 today</span>`;
  if(diff<=3)return `<span class="pill" style="background:#fdebd9;color:#b4764a">📅 ${diff===1?"tomorrow":"in "+diff+"d"}</span>`;
  return `<span class="pill pill-gray">📅 ${esc(t.due.slice(5))}</span>`;
}

function wireTaskDnD(){

/* one move, everything follows: status + done flag + linked reminder, in a single save */
async function setTaskStatusById(id,st){
  if(!TASK_STATUSES.some(s=>s[0]===st))return;
  await setSent(n=>{ let c=(n.customReminders||[]).slice();
    const ts=(n.tasks||[]).map(t=>{ if(t.id!==id)return t; const done=st==="done";
      if(done) c=c.map(r=>r.taskId===id&&!r.done?{...r,done:true}:r);     // task done ⇒ its ping is done too
      return {...t,status:st,done}; });
    return {...n,tasks:ts,customReminders:c}; });
  render();
}

const OPT_FORMATS=[["long","Long form"],["short","Short form"]];   /* X/Twitter posts moved to the ✍️ Script tab */

async function aiCall(mode,input,vidiq){
  if(!SB) throw new Error("This needs live mode — connect Supabase first.");
  const { data, error } = await SB.functions.invoke(CONFIG.aiFn, { body:{ mode, input:input||{}, userId:CONFIG.userId, vidiq:vidiq||null } });
  if(error) throw new Error(error.message||"AI helper error");
  if(data && data.error) throw new Error(data.error);

/* streaming agent call — live status events ("🔎 searched the web…") while Kiko works, then the final payload */
async function aiCallAgentStream(input,onStatus){
  const res=await fetch(CONFIG.url+"/functions/v1/"+CONFIG.aiFn,{ method:"POST",
    headers:{ "Content-Type":"application/json", apikey:CONFIG.anonKey, Authorization:"Bearer "+CONFIG.anonKey },
    body:JSON.stringify({ mode:"agent", input:input||{}, userId:CONFIG.userId, stream:true }) });
  if(!res.ok||!res.body) throw new Error("stream unavailable");
  const rd=res.body.getReader(); const dec=new TextDecoder(); let buf="", payload=null;
  while(true){ const {done,value}=await rd.read(); if(done)break; buf+=dec.decode(value,{stream:true});
    let i; while((i=buf.indexOf("\n\n"))>=0){ const chunk=buf.slice(0,i); buf=buf.slice(i+2);
      const m=chunk.match(/^data:\s*(.+)$/m); if(!m)continue;
      try{ const ev=JSON.parse(m[1]);
        if(ev.t==="status"&&onStatus){ try{ onStatus(ev.text); }catch(_){} }
        else if(ev.t==="done") payload=ev.payload;
      }catch(_){} } }
  if(!payload) throw new Error("stream ended without a reply");
  if(payload.error) throw new Error(payload.error);
  return payload;
}

let RECOG=null, scrRecOn=false;
function viewScript(){
  const sent=state.sentinel||{}; const saved=sent.scripts||[];
  if(!state.script) state.script={kind:"short",title:"",references:"",raw:"",out:null};
  const s=state.script, kind=s.kind||"short"; const tw=kind==="twitter";

  const bodyLabel=tw?"post":"script";

  const out=s.out;
  const chars=tw&&out&&out.script?String(out.script).length:0;
  const outHtml = out ? `<div class="soft-card" style="margin-top:10px">
      ${(out.hooks&&out.hooks.length)?`<div class="label">${tw?'opening-line options':'hook options'}</div>${out.hooks.map(h=>`<div style="display:flex;gap:8px;align-items:flex-start;margin:4px 0"><span class="grow" style="font-size:12.5px">${esc(h)}</span><button class="btn" data-act="scrCopyHook" data-t="${esc(h)}" style="padding:2px 8px">copy</button></div>`).join("")}`:""}
      <div class="label" style="margin-top:10px">${bodyLabel}${out.title?` · <span class="soft">${esc(out.title)}</span>`:""}${tw?` <span class="soft" style="font-weight:500">· ${chars} char${chars===1?'':'s'}${chars>280?' (thread)':''}</span>`:""} <button class="btn" data-act="scrCopyScript" style="padding:2px 8px;margin-left:6px">copy ${bodyLabel}</button></div>
      <div id="scrScript" style="white-space:pre-wrap;font-size:13px;line-height:1.6;border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:4px;background:#fff">${esc(out.script||"")}</div>
      ${out.cta?`<div class="label" style="margin-top:8px">${tw?'closing line':'CTA'}</div><div class="soft" style="font-size:12.5px">${esc(out.cta)}</div>`:""}
    </div>` : "";

  const savedHtml = saved.length?`<section class="panel"><div class="card-head"><span class="label">📁 saved drafts</span></div>${saved.slice().reverse().map(d=>{const kp=kpill(d.kind);return `<div style="display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--line)"><span class="pill ${kp[0]}">${kp[1]}</span><span class="grow" style="font-size:12.5px">${esc(d.title||"(untitled)")}</span><button class="btn" data-act="loadScript" data-id="${d.id}">open</button><button class="x" data-act="delScript" data-id="${d.id}" title="remove">✕</button></div>`;}).join("")}</section>`:"";
  return `<div style="max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:14px">
    <section class="panel">
      <div class="card-head"><h2 style="font-size:18px">✍️ Script writer</h2>${seg}</div>
      <p class="soft" style="font-size:12.5px;margin:0 0 12px">${tw?"Talk out your idea (or paste notes) — I'll shape it into an X/Twitter post in your voice, with a few opening-line options. ❄️🦊":`Drop in your research, then just talk it out — I'll shape your own words into your ${kindWord} format, in your voice. ❄️🦊`}${DEMO?` <b>(Deploy the ai function &amp; turn demo off to format.)</b>`:""}</p>
      <div class="label">Working title <span class="soft">· optional</span></div>
      <input class="inp" id="scrTitle" value="${esc(s.title||"")}" placeholder="${tw?'e.g. one year of being a little snowfox 🦊':'e.g. I tried cozy gaming on a $0 setup'}" />
      <div class="label" style="margin-top:10px">Research / references <span class="soft">· paste facts, links, notes</span></div>
      <textarea class="inp" id="scrRefs" rows="4" placeholder="paste your sources, bullet points, key facts…">${esc(s.references||"")}</textarea>
      <div class="card-head" style="margin-top:12px"><div class="label">🎙️ Your words <span class="soft">· talk, it types for you</span></div>
        <div style="display:flex;gap:6px"><button class="btn" id="recBtn" data-act="recToggle">🎙️ Record</button><button class="btn" data-act="scrClearRaw">clear</button></div></div>
      <textarea class="inp" id="scrRaw" rows="7" placeholder="${tw?'what do you want to post about? talk or type — I’ll tidy it. ❄️':'hit Record and just talk — or type. Don’t worry about being tidy, I’ll clean it up. ❄️'}">${esc(s.raw||"")}</textarea>
      <div id="recHint" class="soft" style="font-size:11.5px;margin-top:4px"></div>
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap"><button class="btn btn-grad" data-act="formatScript">✨ ${tw?'write the X post':'format into a '+kindWord+' script'}</button><button class="btn" data-act="saveScript">💾 save draft</button><button class="btn" data-act="teachVoice" data-v="${tw?'twitter':'script'}" title="paste your own writing so it sounds like you">🎓 teach my voice${voiceExamples(tw?'twitter':'script').length?` · ${voiceExamples(tw?'twitter':'script').length}`:""}</button></div>
      <div id="scrOut">${outHtml}</div>
    </section>
    ${savedHtml}
  </div>`;
}
function scrCapture(){ if(!state.script)state.script={kind:"short"}; const g=id=>{const el=document.getElementById(id);return el?el.value:undefined;}; const t=g("scrTitle"),r=g("scrRefs"),w=g("scrRaw"); if(t!=null)state.script.title=t; if(r!=null)state.script.references=r; if(w!=null)state.script.raw=w; }
function setRecBtn(on){ const b=document.getElementById("recBtn"); if(b){ b.textContent=on?"⏹ Stop":"🎙️ Record"; b.classList.toggle("on",on); } const h=document.getElementById("recHint"); if(h)h.textContent=on?"listening… speak naturally, tap Stop when you're done 🌸":""; }
function scrRecToggle(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ toast("Voice typing needs Chrome or Edge on desktop 🌸"); return; }
  if(!state.script)state.script={kind:"short",raw:""};
  if(scrRecOn){ scrRecOn=false; try{RECOG&&RECOG.stop();}catch(e){} scrCapture(); setRecBtn(false); return; }
  try{ RECOG=new SR(); }catch(e){ toast("Couldn't start the mic 🌸"); return; }
  RECOG.lang="en-US"; RECOG.continuous=true; RECOG.interimResults=true;
  RECOG.onresult=function(e){ let interim="",fin=""; for(let i=e.resultIndex;i<e.results.length;i++){ const tx=e.results[i][0].transcript; if(e.results[i].isFinal)fin+=tx; else interim+=tx; } if(fin){ state.script.raw=((state.script.raw||"").replace(/\s*$/,"")+" "+fin.trim()).trim(); } const ta=document.getElementById("scrRaw"); if(ta){ ta.value=state.script.raw+(interim?" "+interim:""); ta.scrollTop=ta.scrollHeight; } };
  RECOG.onerror=function(e){ if(e.error==="not-allowed"||e.error==="service-not-allowed"){ toast("Let the browser use your mic 🌸"); scrRecOn=false; setRecBtn(false); } };
  RECOG.onend=function(){ if(scrRecOn){ try{RECOG.start();}catch(e){} } };   // auto-continue after pauses until Stop
  try{ RECOG.start(); scrRecOn=true; setRecBtn(true); }catch(e){ toast("Mic busy — try again 🌸"); }
}
async function scrFormat(){
  scrCapture(); if(scrRecOn)scrRecToggle(); const out=document.getElementById("scrOut"); if(!out)return;
  if(DEMO||!SB){ out.innerHTML=`<div class="soft-card" style="font-size:12.5px;margin-top:10px">✨ Runs once the ai function is deployed and demo is off ❄️</div>`; return; }
  if(!(state.script.raw||"").trim() && !(state.script.references||"").trim()){ toast("Add some words or research first 🌸"); return; }
  const tw=state.script.kind==="twitter";
  out.innerHTML=`<div class="label" style="margin-top:10px">${tw?'writing your post… ❄️🦊':'shaping your script… ❄️🦊'}</div>`;
  try{ const r=await aiCall("script",{kind:state.script.kind,title:state.script.title,references:state.script.references,raw:state.script.raw,voice:voiceExamples(tw?"twitter":"script")}); if(r&&r.error){ out.innerHTML=`<div class="soft" style="color:var(--sakura-deep);font-size:12.5px;margin-top:10px">${esc(r.error)}</div>`; return; } state.script.out=r; render(); }
  catch(e){ out.innerHTML=`<div class="soft" style="color:var(--sakura-deep);font-size:12.5px;margin-top:10px">${esc(e.message||e)}</div>`; }
}
async function scrSaveDraft(){
  scrCapture(); const s=state.script; if(!(s.title||s.raw||s.references)){ toast("Nothing to save yet 🌸"); return; }
  await setSent(n=>{ const list=(n.scripts||[]).slice(); const rec={id:s.id||("sc"+uid().slice(0,8)),kind:s.kind,title:s.title||"",references:s.references||"",raw:s.raw||"",out:s.out||null,updated:new Date().toISOString()}; const i=list.findIndex(x=>x.id===rec.id); if(i>=0)list[i]=rec; else list.push(rec); s.id=rec.id; return {...n,scripts:list}; });
  toast("Saved 💗"); render();
}
async function scrLoadDraft(id){ const d=((state.sentinel||{}).scripts||[]).find(x=>x.id===id); if(d){ state.script={id:d.id,kind:d.kind||"short",title:d.title||"",references:d.references||"",raw:d.raw||"",out:d.out||null}; render(); } }
async function scrDelDraft(id){ await setSent(n=>({...n,scripts:(n.scripts||[]).filter(x=>x.id!==id)})); toast("Removed"); render(); }
