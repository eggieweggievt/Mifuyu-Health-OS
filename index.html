<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mifuyu Health OS ❄️🦊</title>
<link rel="icon" type="image/png" href="sakura.png" />
<link rel="apple-touch-icon" href="AYAYA.png" />
<!-- =========================================================================
  Mifuyu Health OS — a gentle, private snowfox health companion for Mifu 🦊❄️
  PCOS patterns · Mounjaro (tirzepatide) journey · weight (trend-first) ·
  mental-health Care tools · gentle pattern-spotter. NOT a medical device.
  Self-tracking, not diagnosis — her care team's plan always comes first.
========================================================================== -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@500;600&display=swap" rel="stylesheet" />
<!-- Supabase is loaded lazily at boot, and only when CONFIG keys are set (see start() at the bottom). -->
<style>
  :root{
    /* snowfox winter palette */
    --bg:#eef2fb; --bg2:#f4eefb; --panel:#fff; --panel-soft:#f6f8ff;
    --line:#e4e6f5; --line-2:#dde0f1; --ink:#3a3550; --ink-soft:#6a6488; --muted:#9b96b6;
    --peri:#758ac6; --peri-deep:#5f74b4; --sakura:#ff9ed8; --sakura-deep:#ec74bf;
    --lav:#a98fe0; --lav-deep:#8d6fd1; --mint:#6fc3ab; --ice:#9fc3e8; --peach:#f3a978;
    --shadow:0 6px 22px rgba(120,130,200,.14); --shadow-sm:0 2px 8px rgba(120,130,200,.10);
    --r:18px; --sans:"Quicksand",ui-rounded,"SF Pro Rounded",system-ui,sans-serif; --display:"Fredoka",var(--sans);
  }
  *{box-sizing:border-box;} html,body{margin:0;padding:0;}
  body{background:var(--bg);background-image:radial-gradient(80% 50% at 100% 0%,#f7e0f3 0%,transparent 60%),radial-gradient(70% 50% at 0% 0%,#e2e9fb 0%,transparent 55%);background-attachment:fixed;color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5;font-weight:500;-webkit-font-smoothing:antialiased;min-height:100vh;}
  h1,h2,h3{font-family:var(--display);font-weight:600;margin:0;}
  .muted{color:var(--muted);} .soft{color:var(--ink-soft);} .peri{color:var(--peri-deep);} .sak{color:var(--sakura-deep);} .lav{color:var(--lav-deep);} .mint{color:#3a9d83;}
  .num{font-variant-numeric:tabular-nums;} a{color:var(--lav-deep);}
  button{font-family:inherit;cursor:pointer;font-weight:600;} input,textarea,select{font-family:inherit;font-weight:500;}
  .label{font-size:10.5px;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);font-weight:700;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:16px;}
  .inp{background:#fff;border:1.5px solid var(--line-2);border-radius:12px;padding:9px 12px;color:var(--ink);font-size:13px;width:100%;outline:none;}
  .inp:focus{border-color:var(--peri);box-shadow:0 0 0 3px rgba(117,138,198,.14);}
  textarea.inp{resize:vertical;}
  .btn{background:#fff;border:1.5px solid var(--line-2);border-radius:12px;color:var(--ink-soft);font-size:12px;padding:7px 14px;transition:.15s;}
  .btn:hover{border-color:var(--peri);color:var(--peri-deep);}
  .btn-grad{background:linear-gradient(135deg,var(--peri),var(--sakura));color:#fff;border:none;box-shadow:var(--shadow-sm);}
  .btn-grad:hover{filter:brightness(1.05);color:#fff;}
  .pill{font-size:10px;font-weight:700;padding:2px 9px;border-radius:999px;letter-spacing:.03em;display:inline-block;}
  .pill-peri{background:#e6ecfb;color:var(--peri-deep);} .pill-sak{background:#fde2f2;color:var(--sakura-deep);}
  .pill-lav{background:#ece2fb;color:var(--lav-deep);} .pill-mint{background:#dcf3eb;color:#2f9d79;}
  .pill-ice{background:#e2f0fb;color:#3c7bb0;} .pill-gray{background:#f0eef6;color:var(--muted);}
  ::-webkit-scrollbar{width:9px;height:9px;} ::-webkit-scrollbar-thumb{background:#ddd9ef;border-radius:9px;}
  #rail{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;position:sticky;top:0;z-index:20;background:rgba(255,255,255,.80);backdrop-filter:blur(12px);border-bottom:2px solid transparent;border-image:linear-gradient(90deg,#9fc3e8,#758ac6,#a98fe0,#ff9ed8) 1;flex-wrap:wrap;gap:8px;}
  .brand{font-family:var(--display);font-size:18px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:8px;}
  .brand-logo{height:30px;width:auto;display:block;flex:0 0 auto;filter:drop-shadow(0 1px 3px rgba(141,111,209,.3));}
  .brand-name{background:linear-gradient(120deg,#5f74b4,#8d6fd1 50%,#ec74bf);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;letter-spacing:.02em;font-size:17px;}
  nav{display:flex;gap:4px;flex-wrap:wrap;}
  .tab{font-size:13px;padding:6px 13px;border-radius:999px;color:var(--ink-soft);border:none;background:none;}
  .tab.active{background:linear-gradient(135deg,#e6ecfb,#fde2f2);color:var(--sakura-deep);} .tab:hover{color:var(--sakura-deep);}
  #rail .right{display:flex;align-items:center;gap:9px;}
  .chip{font-size:11px;padding:4px 10px;border-radius:999px;border:1.5px solid var(--line-2);color:var(--muted);background:#fff;}
  .chip.on{color:#3a9d83;border-color:#bfe9d8;background:#f0fbf6;} .chip.demo{color:var(--lav-deep);border-color:#ddcdf6;background:#f6f0ff;}
  .avatar{width:34px;height:34px;border-radius:999px;background:linear-gradient(135deg,var(--peri),var(--sakura));display:grid;place-items:center;color:#fff;font-weight:700;overflow:hidden;}
  .avatar img{width:100%;height:100%;object-fit:cover;object-position:center;}
  main{padding:18px;max-width:1320px;margin:0 auto;}
  .grid-home{display:grid;grid-template-columns:320px minmax(0,1fr) 320px;gap:16px;}
  .col{display:flex;flex-direction:column;gap:16px;}
  @media(max-width:1040px){.grid-home{grid-template-columns:1fr;}}
  .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
  .soft-card{background:var(--panel-soft);border:1px solid var(--line);border-radius:14px;padding:12px;}
  .seg{display:inline-flex;background:#eef0fa;border-radius:999px;padding:3px;gap:2px;flex-wrap:wrap;}
  .seg button{border:none;background:none;border-radius:999px;padding:5px 11px;font-size:12px;color:var(--ink-soft);}
  .seg button.on{background:#fff;color:var(--sakura-deep);box-shadow:var(--shadow-sm);}
  .bar{height:6px;border-radius:999px;background:#ede9f6;overflow:hidden;} .bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--peri),var(--sakura));}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:60;background:linear-gradient(135deg,var(--peri),var(--sakura));color:#fff;padding:10px 20px;border-radius:999px;font-weight:700;font-size:13px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;}
  .toast.show{opacity:1;}
  .hidden{display:none!important;} .grow{flex:1;}
  .listrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line);} .listrow:first-child{border-top:none;}
  .x{cursor:pointer;color:var(--muted);border:none;background:none;font-size:15px;} .x:hover{color:var(--sakura-deep);}
  .disc{display:flex;gap:8px;align-items:flex-start;background:linear-gradient(90deg,#eef2ff,#fdf0fb);border:1px dashed var(--lav);border-radius:14px;padding:10px 12px;font-size:11.5px;color:var(--ink-soft);margin-top:14px;}
  .disc b{color:var(--peri-deep);}
  .slip{background:linear-gradient(120deg,#e9eefb,#fdeaf6);border:1px solid var(--line);border-radius:16px;padding:13px 16px;text-align:center;font-family:var(--display);font-size:15px;color:var(--ink);display:flex;align-items:center;justify-content:center;gap:10px;}
  .slip img.deco{height:22px;width:auto;opacity:.92;flex:0 0 auto;}
  .slip .slip-txt{min-width:0;}
  /* ---- accessibility ---- */
  @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important;} }
  body.calm *{animation:none!important;transition:none!important;}
  body.calm{background-image:none;background:#f2f3f8;--peri:#8b9bcf;--peri-deep:#7485bb;--sakura:#e6b6da;--sakura-deep:#bd86ad;--lav:#aea0d2;--lav-deep:#8b7cb8;--mint:#86c2af;}
  body.text-lg{font-size:16px;} body.text-lg .label{font-size:11.5px;} body.text-lg .pill{font-size:12px;}
  /* scales + chip toggles */
  .scale{display:flex;gap:4px;flex-wrap:wrap;}
  .scale button{min-width:34px;height:34px;border:1.5px solid var(--line-2);border-radius:9px;background:#fff;color:var(--ink-soft);font-size:12px;}
  .scale button.on{background:linear-gradient(135deg,var(--peri),var(--sakura));border-color:var(--peri);color:#fff;}
  .scale-ends{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);margin-top:3px;}
  .field{margin:12px 0;} .field>.label{margin-bottom:6px;}
  .chiptog{border:1.5px solid var(--line-2);border-radius:999px;padding:7px 13px;background:#fff;color:var(--ink-soft);font-size:12.5px;display:inline-flex;align-items:center;gap:7px;}
  .chiptog.on{background:#fde2f2;border-color:var(--sakura);color:var(--sakura-deep);}
  .chiprow{display:flex;flex-wrap:wrap;gap:7px;}
  .sitebtn{border:1.5px solid var(--line-2);border-radius:11px;padding:7px 11px;background:#fff;color:var(--ink-soft);font-size:12px;}
  .sitebtn.on{background:linear-gradient(135deg,var(--peri),var(--sakura));border-color:var(--peri);color:#fff;}
  /* entrance / transition animations */
  @keyframes viewFade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  @keyframes popUp{from{opacity:0;transform:translateY(13px) scale(.99)}to{opacity:1;transform:none}}
  @keyframes softPop{from{opacity:0;transform:translateY(8px) scale(.97)}to{opacity:1;transform:none}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  #view.anim{animation:viewFade .30s cubic-bezier(.22,.7,.3,1);}
  /* gentle staggered pop-in of cards on page change (only while .anim is present) */
  #view.anim .panel,#view.anim .slip,#view.anim>details.acc{animation:popUp .44s cubic-bezier(.2,.75,.3,1) backwards;}
  #view.anim .panel:nth-of-type(2){animation-delay:.05s}
  #view.anim .panel:nth-of-type(3){animation-delay:.1s}
  #view.anim .panel:nth-of-type(4){animation-delay:.15s}
  #view.anim .panel:nth-of-type(n+5){animation-delay:.2s}
  #view.anim .col{animation:fadeIn .4s ease backwards}
  #view.anim .col:nth-of-type(2){animation-delay:.07s} #view.anim .col:nth-of-type(3){animation-delay:.14s}
  /* modal + pet chat scale-in */
  .modal-bg{animation:fadeIn .18s ease;}
  .modal{animation:softPop .26s cubic-bezier(.2,.8,.3,1);}
  #kikoChat:not(.hidden){animation:softPop .24s cubic-bezier(.2,.8,.3,1);}
  .tab{transition:background .16s,color .16s,transform .12s;}
  .tab:active{transform:scale(.95);}
  .btn,.btn-grad,.chip{transition:transform .12s,filter .15s,border-color .15s,color .15s,background .15s;}
  .btn:active,.btn-grad:active{transform:scale(.96);}
  .pill{transition:transform .12s;}
  .scale button,.chiptog,.sitebtn,.tog{transition:transform .12s,background .15s,border-color .15s,color .15s;}
  .scale button:active,.chiptog:active,.sitebtn:active{transform:scale(.93);}
  /* sparkline bars */
  .spark{display:flex;align-items:flex-end;gap:2px;height:40px;}
  .spark span{flex:1;background:linear-gradient(180deg,var(--sakura),var(--peri));border-radius:3px 3px 0 0;min-height:2px;opacity:.9;}
  .spark span.gap{background:#e9e6f2;opacity:.5;min-height:2px;}
  .sparkrow{display:flex;align-items:center;gap:10px;margin:9px 0;}
  .sparkrow .lab{width:118px;font-size:12px;} .sparkrow .now{width:38px;text-align:right;font-weight:700;font-size:13px;font-family:var(--display);}
  /* bignum / stepper */
  .bignum{font-family:var(--display);font-size:26px;color:var(--ink);}
  .hcount{display:flex;align-items:center;gap:10px;} .hcount>span{min-width:34px;text-align:center;font-size:20px;font-family:var(--display);color:var(--ink);}
  .step{width:34px;height:34px;border-radius:11px;border:1.5px solid var(--line-2);background:#fff;color:var(--ink-soft);font-size:17px;display:grid;place-items:center;}
  /* accordion */
  details.acc{border:1px solid var(--line);border-radius:14px;background:var(--panel);box-shadow:var(--shadow-sm);margin-bottom:12px;overflow:hidden;}
  details.acc>summary{list-style:none;cursor:pointer;padding:13px 16px;font-family:var(--display);font-size:15px;color:var(--ink);display:flex;align-items:center;justify-content:space-between;gap:8px;}
  details.acc>summary::-webkit-details-marker{display:none;}
  details.acc>summary::after{content:"▸";color:var(--muted);transition:transform .2s;}
  details.acc[open]>summary::after{transform:rotate(90deg);}
  details.acc>.acc-body{padding:2px 16px 16px;}
  /* care: breathing bubble */
  .breath-wrap{position:relative;height:230px;display:grid;place-items:center;}
  .breath-bubble{width:108px;height:108px;border-radius:999px;background:radial-gradient(circle at 35% 30%,#fff,var(--sakura) 56%,var(--peri));box-shadow:0 0 42px rgba(141,111,209,.45);transform:scale(.72);will-change:transform;}
  .breath-label{position:absolute;font-family:var(--display);font-size:17px;color:#fff;text-shadow:0 1px 7px rgba(95,116,180,.7);pointer-events:none;}
  /* care: flip cards */
  .deck{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
  .flip{perspective:1100px;min-height:198px;cursor:pointer;}
  .flip-inner{position:relative;width:100%;min-height:198px;transition:transform .6s;transform-style:preserve-3d;}
  .flip.open .flip-inner{transform:rotateY(180deg);}
  .flip-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:16px;border:1px solid var(--line);padding:14px;display:flex;flex-direction:column;}
  .flip-back{background:#fff;transform:rotateY(180deg);overflow:auto;font-size:12px;color:var(--ink-soft);}
  .flip-back li{margin:6px 0;}
  /* care: joy jar */
  .jar-stage{display:flex;flex-direction:column;align-items:center;gap:2px;}
  .jar-bub{animation:jarfloat 4.5s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
  @keyframes jarfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .joy-pick{min-height:26px;font-family:var(--display);font-size:16px;color:var(--lav-deep);margin-top:8px;text-align:center;}
  .joy-pick.pop{animation:joypop .5s ease;} @keyframes joypop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.13)}100%{transform:scale(1);opacity:1}}
  /* sticky notes */
  #stickyLayer{position:fixed;inset:0;z-index:80;pointer-events:none;}
  .sticky{position:absolute;width:200px;height:150px;min-width:140px;min-height:110px;border-radius:12px;box-shadow:0 8px 22px rgba(110,100,150,.24);pointer-events:auto;display:flex;flex-direction:column;transform:rotate(-1deg);overflow:hidden;}
  .sticky-head{height:26px;display:flex;align-items:center;gap:2px;padding:0 4px 0 8px;cursor:grab;border-radius:12px 12px 0 0;}
  .sticky-head:active{cursor:grabbing;}
  .sticky-tools{display:flex;gap:1px;flex:1;flex-wrap:nowrap;overflow:hidden;}
  .sticky-tools button{border:none;background:rgba(255,255,255,.45);border-radius:5px;width:18px;height:18px;font-size:11px;line-height:1;color:#4a3a55;cursor:pointer;padding:0;}
  .sticky-tools button:hover{background:#fff;}
  .sticky-x{border:none;background:none;font-size:15px;line-height:1;color:rgba(58,53,80,.5);cursor:pointer;flex:0 0 auto;}
  .sticky-body{flex:1;border:none;background:transparent;outline:none;font-family:var(--sans);font-size:12.5px;color:#3a3550;padding:2px 10px 10px;overflow:auto;}
  .sticky-body:empty:before{content:attr(data-ph);color:rgba(58,53,80,.35);}
  .sticky-resize{position:absolute;right:0;bottom:0;width:16px;height:16px;cursor:nwse-resize;background:linear-gradient(135deg,transparent 50%,rgba(58,53,80,.28) 50%);border-radius:0 0 12px 0;}
  #addStickyBtn{position:fixed;left:16px;bottom:16px;z-index:83;border:none;border-radius:999px;width:46px;height:46px;font-size:18px;background:linear-gradient(135deg,var(--peri),var(--sakura));color:#fff;box-shadow:var(--shadow);}
  /* floating timer (rest + pomodoro focus) */
  #restBtn{position:fixed;right:16px;bottom:16px;z-index:83;border:1.5px solid var(--line-2);border-radius:999px;width:46px;height:46px;font-size:18px;background:#fff;box-shadow:var(--shadow);}
  #restWidget{position:fixed;right:16px;bottom:70px;z-index:82;width:236px;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 32px rgba(120,110,160,.26);padding:12px;}
  #restWidget.hidden{display:none;}
  .ring-time{font-family:var(--display);font-size:26px;color:var(--ink);text-align:center;}
  .timer-ic{border:none;background:none;color:var(--ink-soft);font-size:14px;cursor:pointer;padding:2px 6px;border-radius:7px;}
  .timer-ic:hover{background:#f3eef6;color:var(--sakura-deep);}
  /* calendar */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .cal-dow{font-size:11px;text-align:center;color:var(--lav-deep);font-weight:600;padding:2px 0;}
  .cal-grid{min-width:0;}
  .cal-cell{min-width:0;min-height:94px;border:1px solid var(--line);border-radius:12px;padding:5px 6px;background:rgba(255,255,255,.5);display:flex;flex-direction:column;gap:4px;cursor:pointer;transition:background .15s,border-color .15s,transform .12s;}
  .cal-cell:hover{border-color:var(--lav);}
  .cal-cell.other{opacity:.4;}
  .cal-cell.today{border-color:var(--peri);box-shadow:inset 0 0 0 2px rgba(117,138,198,.25);}
  .cal-cell.drag-over{background:rgba(169,143,224,.18);border-color:var(--lav-deep);transform:scale(1.03);}
  .cal-daynum{font-size:11.5px;color:#8a7d92;align-self:flex-end;line-height:1;}
  .cal-cell.today .cal-daynum{color:var(--peri-deep);font-weight:700;}
  .cal-ev{font-size:11px;line-height:1.45;padding:2px 7px;border-radius:8px;color:#3a3550;cursor:grab;user-select:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:transform .12s,opacity .12s,box-shadow .12s;}
  .cal-ev:hover{box-shadow:0 2px 8px rgba(120,110,160,.28);}
  .cal-ev:active{cursor:grabbing;} .cal-ev.dragging{opacity:.45;transform:scale(.95);}
  .cal-stream{font-size:10.5px;line-height:1.4;padding:2px 7px;border-radius:8px;background:rgba(255,158,216,.16);color:var(--sakura-deep);border-left:3px solid var(--sakura);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .12s;}
  .cal-stream:hover{background:rgba(255,158,216,.30);}
  /* multi-day continuous bar */
  .cal-span{font-size:11px;line-height:18px;height:18px;padding:0 7px;color:#3a3550;cursor:grab;user-select:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0 -12px;border-radius:0;transition:opacity .12s,box-shadow .12s;}
  .cal-span:hover{box-shadow:0 2px 8px rgba(120,110,160,.28);}
  .cal-span.lcap{margin-left:-6px;border-top-left-radius:8px;border-bottom-left-radius:8px;}
  .cal-span.rcap{margin-right:-6px;border-top-right-radius:8px;border-bottom-right-radius:8px;}
  .cal-span.dragging{opacity:.45;}
  .cal-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;}
  /* animated trends chart */
  .trchart{width:100%;height:auto;display:block;}
  /* static chart — no animations */
  .tr-line{stroke-dashoffset:0;} .tr-area{opacity:1;} .tr-bar,.tr-stem,.tr-dot{transform:none;}
  /* kiko AI pet */
  #kiko{position:fixed;bottom:14px;left:90px;z-index:81;cursor:grab;touch-action:none;user-select:none;filter:drop-shadow(0 5px 7px rgba(120,110,160,.4));}
  #kiko:active{cursor:grabbing;}
  #kiko .kiko-sprite{image-rendering:pixelated;pointer-events:none;}
  #kikoBubble{position:fixed;left:90px;bottom:92px;z-index:81;max-width:200px;background:#fff;border:1px solid var(--line);border-radius:14px;border-bottom-left-radius:4px;padding:8px 12px;font-size:12.5px;color:var(--ink);box-shadow:var(--shadow);cursor:pointer;}
  #kikoChat{position:fixed;right:18px;bottom:18px;z-index:84;width:310px;max-width:calc(100vw - 36px);height:440px;max-height:74vh;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 16px 42px rgba(120,110,160,.32);display:flex;flex-direction:column;overflow:hidden;}
  #kikoChat.hidden,#kikoBubble.hidden,#kiko.hidden{display:none!important;}
  .kiko-head{display:flex;align-items:center;gap:9px;padding:10px 12px;border-bottom:1px solid var(--line);background:linear-gradient(120deg,#eef2fb,#fdeaf6);}
  .kiko-av{width:36px;height:36px;border-radius:999px;background:#eef2fb center/cover no-repeat url("Kiko%20Sit.png");border:1px solid var(--line);flex:0 0 auto;}
  .kiko-log{flex:1;overflow:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}

const DB = {
  async daily(date){

    const {data}=await SB.from("daily_logs").select("notes").eq("user_id",UID).eq("date",date).maybeSingle();
    return (data&&data.notes)||{};

  async saveDaily(date,merge){
    const cur=await DB.daily(date); const next=merge({...cur});
    if(DEMO){ demo[date]=next; return next; }
    if(!SB) return next;
    await SB.from("daily_logs").upsert({user_id:UID,date,notes:next},{onConflict:"user_id,date"});
    return next;
  },
  async range(days){
    if(DEMO) return Object.entries(demo).filter(([d])=>d!==SENTINEL).map(([date,notes])=>({date,notes}));
    if(!SB) return [];
    const since=dayAgo(-days);
    const {data}=await SB.from("daily_logs").select("date,notes").eq("user_id",UID).gte("date",since).neq("date",SENTINEL);
    return (data||[]).map(r=>({date:r.date,notes:r.notes||{}}));
  },
  async exportAll(){
    if(DEMO) return Object.entries(demo).map(([date,notes])=>({date,notes}));
    if(!SB) return [];
    const {data}=await SB.from("daily_logs").select("*").eq("user_id",UID); return data||[];

/* ===================== PCOS / HEALTH ===================== */
function cycleStats(cyc){
  const h=(cyc.history||[]).filter(x=>x&&x.start).slice().sort((a,b)=>a.start<b.start?-1:1);
  const gaps=[]; for(let i=1;i<h.length;i++) gaps.push(daysBetween(h[i-1].start,h[i].start));
  const lens=h.filter(x=>x.end).map(x=>Math.max(1,daysBetween(x.start,x.end)+1));
  const avg=a=>a.length?Math.round(a.reduce((p,c)=>p+c,0)/a.length):null;
  const withGap=h.map((x,i)=>({...x, gap:i>0?daysBetween(h[i-1].start,x.start):null}));
  return { h:withGap, count:h.length, gaps, avgGap:avg(gaps), minGap:gaps.length?Math.min(...gaps):null, maxGap:gaps.length?Math.max(...gaps):null, avgLen:avg(lens) };
}
function viewPcos(){
  const p=state.today.pcos||{}, m=state.today.mind||{}, cyc=state.sentinel.cycle||{};
  const st=cycleStats(cyc);
  const dx=cyc.lastStart?daysBetween(cyc.lastStart,TODAY):null;
  const months=dx!=null?dx/30.44:null;
  const longGap=dx!=null&&dx>=45;
  return `
  <section class="panel">
    <div class="card-head"><h2 style="font-size:18px">❄️ PCOS — your patterns</h2><span class="pill pill-gray">tap what fits</span></div>
    <div class="soft-card">

      ${cyc.lastStart
        ? `<div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap"><span class="bignum">Day ${dx}</span><span class="soft" style="font-size:12px">since your last period started (${fmtDate(cyc.lastStart)})${months>=1.5?` · ~${months.toFixed(1)} months`:''}</span></div>`
        : `<p class="soft" style="font-size:12.5px;margin:0">No period logged yet — log your next start whenever it comes. ❄️</p>`}
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">

        <button class="btn" data-act="cycleEnd">Log period end</button>
      </div>
      <div class="field"><div class="label">Flow today (optional)</div><div class="chiprow">
        ${["light","med","heavy"].map(f=>`<button class="sitebtn ${state.today.flow===f?'on':''}" data-act="pcosSet" data-f="flow" data-v="${f}">${f}</button>`).join("")}</div></div>
      ${st.count?`<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:4px">
          <div><div class="label">Logged</div><div style="font-weight:700">${st.count} period${st.count===1?'':'s'}</div></div>
          ${st.avgGap?`<div><div class="label">Avg cycle</div><div style="font-weight:700">~${st.avgGap}d</div></div>`:''}
          ${st.gaps.length>1?`<div><div class="label">Range</div><div style="font-weight:700">${st.minGap}–${st.maxGap}d</div></div>`:''}
          ${st.avgLen?`<div><div class="label">Avg length</div><div style="font-weight:700">~${st.avgLen}d</div></div>`:''}
        </div>`:''}
      <p class="soft" style="font-size:11px;margin-top:8px">Cycles vary a lot with PCOS — long or skipped months are common, and that's okay. This just helps you and your doctor see the bigger pattern. 🦊</p>
      ${longGap?`<div class="disc" style="margin-top:8px">${CONFIG.creator.snow}<span>It's been ${months>=2?`about ${Math.round(months)} months`:'a longer stretch'} since your last period. With PCOS that happens — but a long gap is worth a gentle mention to your doctor whenever you next chat. No alarm, just a note. 🦊</span></div>`:''}
      ${st.count?`<details style="margin-top:8px;border:none;background:transparent;padding:0;box-shadow:none"><summary style="font-size:12px">📜 Period history (${st.count})</summary>
        <div style="margin-top:6px">${st.h.slice().reverse().map(x=>`<div class="listrow"><span class="grow" style="font-size:12px">${fmtDate(x.start)}${x.end?` – ${fmtDate(x.end)}`:''} ${x.flow?`<span class="soft">· ${esc(x.flow)}</span>`:''}</span>${x.gap!=null?`<span class="soft" style="font-size:11px" title="days since previous">+${x.gap}d</span>`:''}</div>`).join("")}</div></details>`:''}

  ${DISCLAIMER}`;

function rollingAvg(arr){ if(!arr.length)return null; const l=arr.slice(-4); return l.reduce((a,b)=>a+b.w,0)/l.length; }

}

function buildSeries(){
  const byDate={}; state.range.forEach(r=>byDate[r.date]=r.notes); byDate[TODAY]=state.today;
  const days=[]; for(let i=13;i>=0;i--) days.push(dayAgo(-i));
  const pick=(d,path)=>{ let v=byDate[d]; if(!v)return null; for(const k of path){ v=v&&v[k]; } return v==null?null:v; };
  return { byDate, series:{
    mood:days.map(d=>pick(d,["mind","mood"])), anxiety:days.map(d=>pick(d,["mind","anxiety"])),
    energy:days.map(d=>pick(d,["mind","energy"])), nausea:days.map(d=>pick(d,["mounjaro","nausea"])),
    cravings:days.map(d=>pick(d,["pcos","cravings"])), water:days.map(d=>pick(d,["mounjaro","water"])),
    sleep:days.map(d=>pick(d,["sleep"])) } };
}
function patternSpotter(byDate){
  const rows=Object.entries(byDate).filter(([d])=>d!==SENTINEL).map(([,n])=>n).filter(Boolean);
  if(rows.length<5) return `<p class="soft" style="font-size:12.5px">A few more tracked days (about 5) and gentle patterns will start to appear here. No rush — gaps are fine. ❄️</p>`;
  const obs=[];
  const split=(P,Y)=>{ let hi=[],lo=[]; rows.forEach(r=>{const p=P(r),y=Y(r); if(p==null||y==null)return; (p?hi:lo).push(y);});
    const a=z=>z.length?z.reduce((x,y)=>x+y,0)/z.length:null; return {hi:a(hi),lo:a(lo),nHi:hi.length,nLo:lo.length}; };
  let s=split(r=>r.mounjaro&&r.mounjaro.water!=null?r.mounjaro.water>=6:null,r=>r.mounjaro?r.mounjaro.nausea:null);
  if(s.hi!=null&&s.lo!=null&&s.nHi>=2&&s.nLo>=2&&s.hi<s.lo-0.3)obs.push("🥤 On higher-water days you noted less nausea.");
  s=split(r=>r.mounjaro?(!!r.mounjaro.proteinMeals&&!!r.mounjaro.smallerMeals):null,r=>r.mounjaro?r.mounjaro.nausea:null);
  if(s.hi!=null&&s.lo!=null&&s.nHi>=2&&s.hi<s.lo-0.3)obs.push("🍳 Nausea ran lower on days with protein + smaller meals.");
  s=split(r=>r.sleep!=null?r.sleep>=7:null,r=>r.mind?r.mind.mood:null);
  if(s.hi!=null&&s.lo!=null&&s.nHi>=2&&s.nLo>=2&&s.hi>s.lo+0.3)obs.push("😴 Mood tended to be gentler after longer sleep.");
  s=split(r=>r.mind&&r.mind.anxiety!=null?r.mind.anxiety>=3:null,r=>r.mind?r.mind.mood:null);
  if(s.hi!=null&&s.lo!=null&&s.nHi>=2&&s.hi<s.lo-0.3)obs.push("🌧️ Mood tended to dip on higher-anxiety days — those may deserve extra softness.");
  s=split(r=>r.pcos?!!r.pcos.moved:null,r=>r.pcos?r.pcos.cravings:null);
  if(s.hi!=null&&s.lo!=null&&s.nHi>=2&&s.hi<s.lo-0.3)obs.push("🍩 Cravings were lower on days you moved your body.");
  if(!obs.length)obs.push("Nothing jumping out yet — your logs look gently varied. That's perfectly okay. ❄️");
  return `<ul style="padding-left:18px;font-size:13px">${obs.map(o=>`<li style="margin:6px 0">${o}</li>`).join("")}</ul>
    <p class="soft" style="font-size:11px;margin-top:6px">Gentle observations from your own logs — patterns, not proof, and never a diagnosis. Worth a mention to your care team if something rings true. ❄️🦊</p>`;
}
/* ----- animated visual trends chart ----- */
const TREND_METRICS=[
  ["mood","🌤️","Mood",5,"up",["🌧️","🌞"]],
  ["anxiety","🫂","Anxiety",5,"down",["calm","high"]],
  ["energy","⚡","Energy",5,"up",["💤","⚡"]],
  ["nausea","🤢","Nausea",5,"down",["ok","rough"]],
  ["cravings","🍩","Cravings",5,"down",["quiet","loud"]],
  ["water","🥤","Water",10,"up",["low","lots"]],
  ["sleep","🌙","Sleep",12,"up",["short","long"]],
];
const TREND_TYPES=["area","bars","dots"];
function trendRuns(vals){ const r=[]; let cur=null; vals.forEach((v,i)=>{ if(v==null){ if(cur){r.push(cur);cur=null;} } else { if(!cur)cur=[]; cur.push({i,v}); } }); if(cur)r.push(cur); return r; }
function buildChartSVG(metricKey,type){
  const {series}=buildSeries();
  const meta=TREND_METRICS.find(x=>x[0]===metricKey)||TREND_METRICS[0];
  const vals=series[metricKey]||[]; const max=meta[3];
  const W=600,H=220,padX=30,padT=20,padB=30, plotW=W-padX*2, plotH=H-padT-padB, base=padT+plotH, n=vals.length;
  const xi=i=> padX + (n>1? i*(plotW/(n-1)) : plotW/2);
  const yv=v=> padT + (1-(v/max))*plotH;
  let grid=""; for(let g=0;g<=2;g++){ const yy=padT+g*(plotH/2); grid+=`<line x1="${padX}" y1="${yy.toFixed(0)}" x2="${W-padX}" y2="${yy.toFixed(0)}" stroke="#ece8f4" stroke-width="1"/>`; }
  const days=[]; for(let i=13;i>=0;i--) days.push(dayAgo(-i));
  let ticks=""; [0,Math.floor(n/2),n-1].forEach(i=>{ ticks+=`<text x="${xi(i).toFixed(0)}" y="${H-8}" text-anchor="middle" font-size="11" fill="#9b96b6">${fmtDate(days[i])}</text>`; });
  const hint=`<text x="6" y="${(padT+9).toFixed(0)}" font-size="11" fill="#9b96b6">${meta[5][1]}</text><text x="6" y="${base.toFixed(0)}" font-size="11" fill="#9b96b6">${meta[5][0]}</text>`;
  let body="";
  if(type==="bars"){
    vals.forEach((v,i)=>{ if(v==null)return; const x=xi(i), h=Math.max(2,(v/max)*plotH), y=base-h, bw=Math.min(28,plotW/n*0.62);
      body+=`<rect x="${(x-bw/2).toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${h.toFixed(1)}" rx="6" fill="url(#trg)" class="tr-bar" style="animation-delay:${(i*0.045).toFixed(2)}s"/>`; });
  } else if(type==="dots"){
    vals.forEach((v,i)=>{ if(v==null)return; const x=xi(i), y=yv(v);
      body+=`<line x1="${x.toFixed(1)}" y1="${base}" x2="${x.toFixed(1)}" y2="${y.toFixed(1)}" stroke="var(--peri)" stroke-width="2" opacity=".3" class="tr-stem" style="animation-delay:${(i*0.045).toFixed(2)}s"/>`;
      body+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="7" fill="url(#trg)" class="tr-dot" style="animation-delay:${(i*0.05).toFixed(2)}s"/>`; });
  } else {
    trendRuns(vals).forEach(run=>{
      const pts=run.map(p=>`${xi(p.i).toFixed(1)} ${yv(p.v).toFixed(1)}`);
      body+=`<path d="M${xi(run[0].i).toFixed(1)} ${base} L${pts.join(" L")} L${xi(run[run.length-1].i).toFixed(1)} ${base} Z" fill="url(#trgf)" class="tr-area"/>`;
      body+=`<path d="M${pts.join(" L")}" pathLength="1" fill="none" stroke="url(#trg)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" class="tr-line"/>`;
      run.forEach(p=>{ body+=`<circle cx="${xi(p.i).toFixed(1)}" cy="${yv(p.v).toFixed(1)}" r="4" fill="#fff" stroke="var(--sakura)" stroke-width="2.5" class="tr-dot" style="animation-delay:${(p.i*0.04).toFixed(2)}s"/>`; });
    });
  }
  return `<svg class="trchart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="trg" x1="0" x2="1"><stop offset="0" stop-color="#758ac6"/><stop offset="1" stop-color="#ff9ed8"/></linearGradient>
    <linearGradient id="trgf" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#ff9ed8" stop-opacity=".45"/><stop offset="1" stop-color="#758ac6" stop-opacity=".04"/></linearGradient></defs>
    ${grid}${hint}${body}${ticks}</svg>`;
}
function trendWord(metricKey){
  const {series}=buildSeries(); const vals=(series[metricKey]||[]).filter(v=>v!=null);
  const meta=TREND_METRICS.find(x=>x[0]===metricKey)||TREND_METRICS[0]; const name=meta[2];
  if(vals.length<4) return `A few more tracked days and I'll show ${name.toLowerCase()}'s direction. ❄️`;
  const half=Math.max(2,Math.floor(vals.length/2)); const early=vals.slice(0,half), late=vals.slice(-half);
  const avg=a=>a.reduce((p,c)=>p+c,0)/a.length; const d=avg(late)-avg(early);
  const rising=d>0.4, falling=d<-0.4;
  const W={
    mood:{up:"Your mood's been gently lifting 🌤️",down:"Mood's dipped a little — be extra soft with yourself today 💗",flat:"Mood's been pretty steady lately ❄️"},
    anxiety:{up:"Anxiety's run a bit higher — those days deserve extra care 🫂",down:"Anxiety's been easing off 🌿",flat:"Anxiety's held fairly steady ❄️"},
    energy:{up:"Energy's been climbing ⚡",down:"Energy's been lower — rest is allowed 🌙",flat:"Energy's been pretty even ❄️"},
    nausea:{up:"Nausea's been louder lately — water + smaller meals might help 🥤",down:"Nausea's been settling down 🌿",flat:"Nausea's been fairly steady ❄️"},
    cravings:{up:"Cravings have been louder lately 🍩",down:"Cravings have been quieter ✨",flat:"Cravings have been steady ❄️"},
    water:{up:"You've been drinking more water — lovely 🥤",down:"Water's dipped — a soft nudge to sip 💧",flat:"Water's been steady ❄️"},
    sleep:{up:"You've been sleeping a little longer 🌙",down:"Sleep's been shorter lately — gentle nights ahead 🌙",flat:"Sleep's been fairly steady ❄️"},
  };
  const m=W[metricKey]||W.mood; return rising?m.up:falling?m.down:m.flat;
}

/* ===================== CALENDAR (front-end only; events on sentinel row) ===================== */
const CAL_TZ_TARGET="Europe/Amsterdam";   // Mifu is CET — everything is shown in this zone
const CAL_TZ_LABEL="CET";
const CAL_TZS=[["Europe/Amsterdam","CET · Europe (your time)"],["Europe/London","UK"],["UTC","UTC"],["America/New_York","ET · Eastern"],["America/Chicago","CT · Central"],["America/Denver","MT · Mountain"],["America/Los_Angeles","PT · Pacific"],["Asia/Tokyo","JP · Japan"]];
const CAL_TZ_SHORT={"Europe/Amsterdam":"CET","Europe/London":"UK","UTC":"UTC","America/New_York":"ET","America/Chicago":"CT","America/Denver":"MT","America/Los_Angeles":"PT","Asia/Tokyo":"JP"};
const CAL_COLORS=["#9fc7f0","#c9b8f0","#a9e0cb","#ff9ed8","#b8d4f0"];   // sky · lavender · mint · sakura · ice
const GAME_COLOR_DEFAULT="#f6cba9";
let CAL_COLOR=CAL_COLORS[0];
function tzOffsetMs(tz,utcMs){ const p=new Intl.DateTimeFormat("en-US",{timeZone:tz,hourCycle:"h23",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"}).formatToParts(new Date(utcMs)).reduce((a,x)=>(a[x.type]=x.value,a),{}); const asUTC=Date.UTC(+p.year,+p.month-1,+p.day,+p.hour,+p.minute,+p.second); return asUTC-utcMs; }
function wallToUtc(dateStr,timeStr,tz){ const [Y,M,D]=dateStr.split("-").map(Number); const [h,m]=(timeStr||"00:00").split(":").map(Number); const guess=Date.UTC(Y,M-1,D,h,m); let off=tzOffsetMs(tz,guess); off=tzOffsetMs(tz,guess-off); return guess-off; }
function toLocal(dateStr,timeStr,tz){ if(!timeStr)return null; const utc=wallToUtc(dateStr,timeStr,tz||CAL_TZ_TARGET); const p=new Intl.DateTimeFormat("en-US",{timeZone:CAL_TZ_TARGET,hour:"numeric",minute:"2-digit",hour12:true,year:"numeric",month:"2-digit",day:"2-digit"}).formatToParts(new Date(utc)).reduce((a,x)=>(a[x.type]=x.value,a),{}); const lDate=`${p.year}-${p.month}-${p.day}`; return { tTime:`${p.hour}:${p.minute} ${p.dayPeriod}`, tDate:lDate, dayDiff:lDate!==dateStr }; }
function fmt12(timeStr){ if(!timeStr)return ""; const [h,m]=timeStr.split(":").map(Number); const ap=h<12?"AM":"PM"; const hh=h%12||12; return `${hh}:${String(m).padStart(2,"0")} ${ap}`; }
function calShift(iso,delta){ const d=new Date(iso+"T00:00"); d.setDate(d.getDate()+delta); return d.toLocaleDateString("en-CA"); }

function renderCalendar(){
  const sent=state.sentinel||{};
  const events=sent.calendarEvents||[];
  const schedule=sent.schedule||[];
  const gameColor=sent.gameColor||GAME_COLOR_DEFAULT;
  const showStreams=state.calShowStreams!==false, showGames=state.calShowGames!==false;
  if(!state.calRef){ const t=new Date(); state.calRef=new Date(t.getFullYear(),t.getMonth(),1); }
  const ref=state.calRef, y=ref.getFullYear(), m=ref.getMonth();
  const startDow=new Date(y,m,1).getDay();
  const gridStart=new Date(y,m,1-startDow);
  const monthName=ref.toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const dows=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const dayShortFull=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let cells="";
  for(let i=0;i<42;i++){
    const d=new Date(gridStart); d.setDate(gridStart.getDate()+i);
    const ds=d.toLocaleDateString("en-CA");
    const inMonth=d.getMonth()===m, isToday=ds===TODAY;
    const dayShort=dayShortFull[d.getDay()];
    const streamChips=showStreams?schedule.filter(s=>s.day===dayShort).map(s=>`<div class="cal-stream" data-act="editSchedule" title="Stream day — tap to edit your schedule">🔴 ${s.time?esc(s.time)+" · ":""}${esc(s.show||s.title||"Stream")}</div>`).join(""):"";
    const dow=d.getDay();
    const dayEvents=events.filter(ev=> ds>=ev.date && ds<=(ev.endDate||ev.date) && (showGames||ev.src!=="game"));
    // multi-day events → one continuous bar (rendered first so they line up across cells)
    const spanBars=dayEvents.filter(ev=>ev.endDate&&ev.endDate>ev.date)
      .sort((a,b)=>(a.date+a.id).localeCompare(b.date+b.id)).map(ev=>{
        const bg=ev.src==="game"?gameColor:(ev.color||CAL_COLORS[0]);
        const ic=ev.src==="game"?"🎮 ":"";
        const isStart=ds===ev.date, isEnd=ds===ev.endDate, leftCap=isStart||dow===0, rightCap=isEnd||dow===6, showTitle=isStart||dow===0;
        const linkable=ev.src==="game"&&ev.url, act=linkable?`data-act="calLink" data-url="${esc(ev.url)}"`:`data-act="calEvent"`, lk=linkable?" 🔗":"";
        const tip=esc(ic+ev.title+(ev.note?" — "+ev.note:"")+(linkable?" — (tap to open update)":""));
        return `<div class="cal-span${leftCap?' lcap':''}${rightCap?' rcap':''}" data-eid="${ev.id}" ${act} draggable="${isStart?'true':'false'}" style="background:${bg}" title="${tip}">${showTitle?ic+esc(ev.title)+lk:"&nbsp;"}</div>`;
      }).join("");
    // single-day events → compact pill, just a short title (time + note open in the event)
    const singleChips=dayEvents.filter(ev=>!(ev.endDate&&ev.endDate>ev.date))
      .sort((a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99")).map(ev=>{
        const bg=ev.src==="game"?gameColor:(ev.color||CAL_COLORS[0]);
        const ic=ev.src==="game"?"🎮 ":"";
        const et=toLocal(ev.date,ev.time,ev.tz);
        const linkable=ev.src==="game"&&ev.url, act=linkable?`data-act="calLink" data-url="${esc(ev.url)}"`:`data-act="calEvent"`, lk=linkable?" 🔗":"";
        const tip=esc((et?et.tTime+" "+CAL_TZ_LABEL+" — ":"")+ev.title+(ev.note?" — "+ev.note:"")+(linkable?" — (tap to open update)":""));
        return `<div class="cal-ev" draggable="true" data-eid="${ev.id}" ${act} style="background:${bg}" title="${tip}">${ic}${esc(ev.title)}${lk}</div>`;
      }).join("");
    cells+=`<div class="cal-cell ${inMonth?"":"other"} ${isToday?"today":""}" data-date="${ds}" data-act="calAdd"><span class="cal-daynum">${d.getDate()}</span>${spanBars}${streamChips}${singleChips}</div>`;
  }
  return `<div class="panel" style="max-width:920px;margin:0 auto">
    <div class="card-head"><div><h2 style="font-size:18px">📅 ${monthName}</h2><div class="label" style="margin-top:2px">tap a day to add · drag to move · 🔴 streams · 🎮 game updates ❄️🦊</div></div>
      <div style="display:flex;gap:6px"><button class="btn" data-act="calPrev" title="previous month">‹</button><button class="btn" data-act="calToday">today</button><button class="btn" data-act="calNext" title="next month">›</button></div></div>

function wireCalDnD(){
  let dragEid=null;
  document.querySelectorAll(".cal-ev[draggable='true'],.cal-span[draggable='true']").forEach(ev=>{
    ev.addEventListener("dragstart",e=>{ dragEid=ev.dataset.eid; ev.classList.add("dragging"); if(e.dataTransfer){e.dataTransfer.effectAllowed="move"; try{e.dataTransfer.setData("text/plain",dragEid);}catch(_){}}});
    ev.addEventListener("dragend",()=>{ ev.classList.remove("dragging"); document.querySelectorAll(".cal-cell.drag-over").forEach(c=>c.classList.remove("drag-over")); });
  });
  document.querySelectorAll(".cal-cell").forEach(cell=>{
    cell.addEventListener("dragover",e=>{ e.preventDefault(); if(e.dataTransfer)e.dataTransfer.dropEffect="move"; cell.classList.add("drag-over"); });
    cell.addEventListener("dragleave",()=>cell.classList.remove("drag-over"));
    cell.addEventListener("drop",async e=>{
      e.preventDefault(); cell.classList.remove("drag-over");
      const eid=dragEid||(e.dataTransfer&&e.dataTransfer.getData("text/plain"));
      const date=cell.dataset.date;
      if(!eid||!date)return;
      await DB.saveDaily(SENTINEL,n=>{ const evs=(n.calendarEvents||[]).slice(); const t=evs.find(x=>x.id===eid);
        if(t){ if(t.endDate&&t.endDate>t.date){ const delta=daysBetween(t.date,date); t.endDate=calShift(t.endDate,delta); } t.date=date; } return {...n,calendarEvents:evs}; });
      state.sentinel=await DB.daily(SENTINEL); render();
    });
  });
}

/* ===================== BREATHING (JS paced) ===================== */
let breathRAF=null;
function startBreath(){
  const bub=$("#bubble"), lab=$("#breathLabel"); if(!bub)return;
  if(breathRAF){ cancelAnimationFrame(breathRAF); clearInterval(breathRAF); breathRAF=null; } // idempotent — never stack loops
  if(PREF.calm){
    let phase=0; const words=["breathe in… (4)","hold… (2)","breathe out… (6)"];
    lab.textContent=words[0];
    breathRAF=setInterval(()=>{ phase=(phase+1)%3; lab.textContent=words[phase]; },4000); return;
  }
  const IN=4000,HOLD=2000,OUT=6000,CYCLE=IN+HOLD+OUT, MIN=.62,MAX=1.18;
  const t0=performance.now();
  function frame(now){
    const t=(now-t0)%CYCLE; let scale,word;
    if(t<IN){ scale=MIN+(MAX-MIN)*(t/IN); word="breathe in…"; }
    else if(t<IN+HOLD){ scale=MAX; word="hold…"; }
    else { const o=(t-IN-HOLD)/OUT; scale=MAX-(MAX-MIN)*o; word="breathe out…"; }
    bub.style.transform="scale("+scale.toFixed(3)+")"; lab.textContent=word;
    breathRAF=requestAnimationFrame(frame);
  }
  breathRAF=requestAnimationFrame(frame);
}
function stopBreath(){ if(breathRAF){ cancelAnimationFrame(breathRAF); clearInterval(breathRAF); breathRAF=null; }
  const bub=$("#bubble"),lab=$("#breathLabel"); if(bub)bub.style.transform="scale(.72)"; if(lab)lab.textContent="ready"; }

function stickyHTML(s){ return (s.html!=null) ? s.html : esc(s.text||""); }
async function persistStickies(list){ state.sentinel.stickies=list; await DB.saveDaily(SENTINEL,n=>({...n,stickies:list})); }
async function addSticky(text){

function fmtCmd(cmd){

let dragInfo=null;
function startDrag(ev,id){ ev.preventDefault(); const el=ev.target.closest('.sticky');
  dragInfo={ id, el, dx:ev.clientX-el.offsetLeft, dy:ev.clientY-el.offsetTop };
  window.addEventListener('pointermove',onDrag); window.addEventListener('pointerup',endDrag,{once:true}); }
function onDrag(ev){ if(!dragInfo)return; const el=dragInfo.el;
  let x=Math.max(0,Math.min(ev.clientX-dragInfo.dx,window.innerWidth-el.offsetWidth));
  let y=Math.max(0,Math.min(ev.clientY-dragInfo.dy,window.innerHeight-el.offsetHeight));
  el.style.left=x+"px"; el.style.top=y+"px"; }
async function endDrag(){ window.removeEventListener('pointermove',onDrag); if(!dragInfo)return;
  const el=dragInfo.el, id=dragInfo.id; const x=el.offsetLeft/Math.max(1,window.innerWidth-el.offsetWidth), y=el.offsetTop/Math.max(1,window.innerHeight-el.offsetHeight);
  await persistStickies((state.sentinel.stickies||[]).map(s=>s.id===id?{...s,x,y}:s)); dragInfo=null; }
let resizeInfo=null;
function startResize(ev,id){ ev.preventDefault(); ev.stopPropagation(); const el=ev.target.closest('.sticky');
  resizeInfo={ id, el, sx:ev.clientX, sy:ev.clientY, sw:el.offsetWidth, sh:el.offsetHeight };
  window.addEventListener('pointermove',onResize); window.addEventListener('pointerup',endResize,{once:true}); }
function onResize(ev){ if(!resizeInfo)return; const el=resizeInfo.el;
  el.style.width=Math.max(140,resizeInfo.sw+(ev.clientX-resizeInfo.sx))+"px";
  el.style.height=Math.max(110,resizeInfo.sh+(ev.clientY-resizeInfo.sy))+"px"; }
async function endResize(){ window.removeEventListener('pointermove',onResize); if(!resizeInfo)return;
  const el=resizeInfo.el, id=resizeInfo.id, w=el.offsetWidth, h=el.offsetHeight;
  await persistStickies((state.sentinel.stickies||[]).map(s=>s.id===id?{...s,w,h}:s)); resizeInfo=null; }
window.addEventListener('resize',()=>renderStickies());

/* ===================== FLOATING TIMER (rest + pomodoro focus, pop-out) ===================== */
const TIMER={ open:false, mode:"rest", running:false, iv:null, secs:300, total:300,
  phase:"focus", workMin:25, breakMin:5, restMin:5, cycles:0 };
let pipWin=null;
function toggleTimer(){
  if(pipWin){ try{ pipWin.close(); }catch(_){} pipWin=null; }
  TIMER.open=!TIMER.open;
  $("#restWidget").classList.toggle("hidden", !TIMER.open);
  if(TIMER.open) paintTimer();
}
function timerTarget(){ return pipWin ? pipWin.document.getElementById("timerHost") : $("#restWidget"); }
function timerMarkup(){
  const mm=String(Math.floor(TIMER.secs/60)).padStart(2,'0'), ss=String(TIMER.secs%60).padStart(2,'0');
  const pct=TIMER.total?(1-TIMER.secs/TIMER.total):0; const R=42,C=2*Math.PI*R;
  const isFocus=TIMER.mode==="focus", onBreak=isFocus&&TIMER.phase==="break";
  const ring=onBreak?"#7ed0b0":"url(#rg)";
  const presets=isFocus
    ? [[25,5],[50,10],[15,3]].map(([w,b])=>`<button data-tpreset="${w}-${b}" class="${TIMER.workMin===w&&TIMER.breakMin===b?'on':''}">${w}/${b}</button>`).join("")
    : [5,15,25].map(m=>`<button data-tpreset="${m}" class="${TIMER.restMin===m?'on':''}">${m}m</button>`).join("");
  return `<div style="display:flex;justify-content:space-between;align-items:center">
      <div class="seg" style="padding:2px"><button data-tmode="rest" class="${!isFocus?'on':''}">🫧 Rest</button><button data-tmode="focus" class="${isFocus?'on':''}">🍅 Focus</button></div>
      <div style="display:flex"><button class="timer-ic" data-tact="pop" title="Pop out (stay on top)">⧉</button><button class="timer-ic" data-tact="close" title="close">✕</button></div></div>
    <div style="text-align:center;font-family:var(--display);font-size:13px;color:${onBreak?'#3a9d83':'var(--sakura-deep)'};margin-top:4px">${isFocus?(onBreak?'Break':'Focus')+' · round '+(TIMER.cycles+1):'Rest'}</div>
    <svg width="110" height="110" viewBox="0 0 110 110" style="display:block;margin:2px auto 0">
      <circle cx="55" cy="55" r="${R}" fill="none" stroke="#eee5f3" stroke-width="8"/>
      <circle cx="55" cy="55" r="${R}" fill="none" stroke="${ring}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${(C*(1-pct)).toFixed(1)}" transform="rotate(-90 55 55)"/>
      <defs><linearGradient id="rg" x1="0" x2="1"><stop offset="0" stop-color="#758ac6"/><stop offset="1" stop-color="#ff9ed8"/></linearGradient></defs></svg>
    <div class="ring-time">${mm}:${ss}</div>
    <div class="seg" style="margin:8px auto 6px;justify-content:center;display:flex">${presets}</div>
    <div style="display:flex;gap:6px;justify-content:center"><button class="btn btn-grad" data-tact="toggle">${TIMER.running?'Pause':'Start'}</button><button class="btn" data-tact="reset">Reset</button></div>
    <p class="soft" style="font-size:10.5px;text-align:center;margin:8px 0 0">${isFocus?'Focus, then a kind little break. 🍅':'No goal but rest. Stop whenever. ❄️'}</p>`;
}
function paintTimer(){ const t=timerTarget(); if(!t) return; t.innerHTML=timerMarkup();
  t.querySelectorAll('[data-tmode]').forEach(b=>b.onclick=()=>setTimerMode(b.dataset.tmode));
  t.querySelectorAll('[data-tpreset]').forEach(b=>b.onclick=()=>setTimerPreset(b.dataset.tpreset));
  t.querySelectorAll('[data-tact]').forEach(b=>b.onclick=()=>{ const a=b.dataset.tact;
    if(a==="toggle") timerToggle(); else if(a==="reset") timerReset(); else if(a==="close") toggleTimer(); else if(a==="pop") popOutTimer(); });
}
function timerStop(){ if(TIMER.iv){ clearInterval(TIMER.iv); TIMER.iv=null; } }
function setTimerMode(m){ TIMER.mode=m; TIMER.running=false; timerStop();
  if(m==="rest"){ TIMER.total=TIMER.restMin*60; } else { TIMER.phase="focus"; TIMER.cycles=0; TIMER.total=TIMER.workMin*60; }
  TIMER.secs=TIMER.total; paintTimer(); }
function setTimerPreset(v){ TIMER.running=false; timerStop();
  if(TIMER.mode==="rest"){ TIMER.restMin=Number(v); TIMER.total=TIMER.restMin*60; }
  else { const [w,b]=v.split("-").map(Number); TIMER.workMin=w; TIMER.breakMin=b; TIMER.phase="focus"; TIMER.cycles=0; TIMER.total=w*60; }
  TIMER.secs=TIMER.total; paintTimer(); }
function timerToggle(){ TIMER.running=!TIMER.running; timerStop(); if(TIMER.running) TIMER.iv=setInterval(timerTick,1000); paintTimer(); }
function timerReset(){ TIMER.running=false; timerStop();
  if(TIMER.mode==="focus"){ TIMER.phase="focus"; TIMER.cycles=0; TIMER.total=TIMER.workMin*60; } TIMER.secs=TIMER.total; paintTimer(); }
function timerTick(){
  TIMER.secs=Math.max(0,TIMER.secs-1);
  if(TIMER.secs===0){
    if(TIMER.mode==="rest"){ TIMER.running=false; timerStop(); toast("rest done — well done 🦊"); }
    else if(TIMER.phase==="focus"){ TIMER.phase="break"; TIMER.total=TIMER.breakMin*60; TIMER.secs=TIMER.total; toast("focus done — little break 🍵"); }
    else { TIMER.phase="focus"; TIMER.cycles++; TIMER.total=TIMER.workMin*60; TIMER.secs=TIMER.total; toast("break over — back to it ✨"); }
  }
  paintTimer();
}
async function popOutTimer(){
  if(pipWin){ pipWin.focus(); return; }
  if(!('documentPictureInPicture' in window)){ toast("Pop-out needs Chrome or Edge 🦊"); return; }
  try{
    pipWin=await window.documentPictureInPicture.requestWindow({ width:240, height:344 });
    document.querySelectorAll('style').forEach(s=>pipWin.document.head.appendChild(s.cloneNode(true)));
    pipWin.document.body.style.margin="0"; pipWin.document.body.style.background="#fff";
    const host=pipWin.document.createElement('div'); host.id="timerHost"; host.style.padding="12px"; pipWin.document.body.appendChild(host);
    pipWin.addEventListener('pagehide',()=>{ pipWin=null; $("#restWidget").classList.toggle("hidden",!TIMER.open); paintTimer(); });
    $("#restWidget").classList.add("hidden"); paintTimer();
  }catch(e){ console.error(e); pipWin=null; toast("couldn't pop out"); }
}

/* ===================== KIKO — AI snowfox pet ===================== */
const KIKO={ open:false, busy:false, log:[] };
const KIKO_GREETS=["Konfuyu~! Need anything? ❄️","Pspsps… ask me something! 🦊","I'm right here if you need me 💗","Hi Mifu~ ✿","Wanna brainstorm? 🌸"];
/* sprite walk engine + desktop-pet physics — frames measured from fox.png (164x210). Row 2 = 4-frame walk cycle. */
const KIKO_SHEET={url:"fox.png",W:164,H:210};
const KIKO_WALK=[{x:6,y:52,w:35,h:32},{x:44,y:53,w:38,h:31},{x:88,y:52,w:35,h:32},{x:130,y:53,w:34,h:31}];

const KIKO_FACES="right";         // art faces right by default; flip when moving left
let KIKO_RAF=null, kikoX=null, kikoY=0, kikoVX=0, kikoVY=0, kikoDir=1, kikoFrameI=0, kikoFrameT=0, kikoState="walk", kikoStateT=0, kikoLast=0;
function setKikoFrame(f){ const el=$("#kikoSprite"); if(!el)return; const s=KIKO_SCALE;

function kikoFacing(){ const flip=(KIKO_FACES==="right")?(kikoDir<0):(kikoDir>0); return flip?"scaleX(-1)":"scaleX(1)"; }
// pace only between the sticky button (left ~62px) and timer button (right) — clear of both
function kikoBounds(){ return { min:72, max:Math.max(90, window.innerWidth-72-KSPRW) }; }
function positionKikoUI(){
  const k=$("#kiko"); if(k){ k.style.left=Math.round(kikoX)+"px"; k.style.bottom=Math.round(14+kikoY)+"px"; }

function kikoStep(now){
  const sp=$("#kikoSprite"); if(!sp){ KIKO_RAF=requestAnimationFrame(kikoStep); return; }
  const dt=Math.min(60, now-(kikoLast||now)); kikoLast=now;
  if(kikoX==null) kikoX=100;
  if(kikoState==="held" || KIKO.open){ setKikoFrame(KIKO_SIT); sp.style.transform=kikoFacing(); positionKikoUI(); KIKO_RAF=requestAnimationFrame(kikoStep); return; }
  if(kikoState==="thrown"){
    kikoVY-=2400*dt/1000; kikoY+=kikoVY*dt/1000; kikoX+=kikoVX*dt/1000;
    const maxX=window.innerWidth-KSPRW;
    if(kikoX<0){ kikoX=0; kikoVX=-kikoVX*0.55; } else if(kikoX>maxX){ kikoX=maxX; kikoVX=-kikoVX*0.55; }
    const topMax=window.innerHeight-KSPRH-20; if(kikoY>topMax){ kikoY=topMax; kikoVY=-kikoVY*0.4; }
    if(kikoY<=0){ kikoY=0;
      if(Math.abs(kikoVY)<150){ kikoVY=0; kikoVX*=0.55; if(Math.abs(kikoVX)<30){ const b=kikoBounds(); kikoX=Math.max(b.min,Math.min(kikoX,b.max)); kikoState="walk"; kikoStateT=0; } }
      else { kikoVY=-kikoVY*0.5; kikoVX*=0.8; } }
    setKikoFrame(KIKO_SIT); sp.style.transform=(kikoVX<0?"scaleX(-1)":"scaleX(1)"); positionKikoUI(); KIKO_RAF=requestAnimationFrame(kikoStep); return;
  }
  if(PREF.calm){ setKikoFrame(KIKO_SIT); sp.style.transform=kikoFacing(); positionKikoUI(); KIKO_RAF=requestAnimationFrame(kikoStep); return; }
  const b=kikoBounds(); kikoStateT+=dt;
  if(kikoState==="walk"){
    kikoX += kikoDir*44*dt/1000;
    if(kikoX<=b.min){ kikoX=b.min; kikoDir=1; } else if(kikoX>=b.max){ kikoX=b.max; kikoDir=-1; }
    kikoFrameT+=dt; if(kikoFrameT>=150){ kikoFrameT=0; kikoFrameI=(kikoFrameI+1)%KIKO_WALK.length; }
    setKikoFrame(KIKO_WALK[kikoFrameI]); sp.style.transform=kikoFacing();
    if(kikoStateT>4500+Math.random()*4000){ kikoState="sit"; kikoStateT=0; }
  } else {
    setKikoFrame(KIKO_SIT); sp.style.transform=kikoFacing();
    if(kikoStateT>1800+Math.random()*2200){ kikoState="walk"; kikoStateT=0; }
  }
  positionKikoUI(); KIKO_RAF=requestAnimationFrame(kikoStep);
}
function kikoStart(){ if(KIKO_RAF)return; kikoLast=performance.now(); kikoSetupDrag(); KIKO_RAF=requestAnimationFrame(kikoStep); }
function kikoSetupDrag(){
  const k=$("#kiko"); if(!k||k._wired) return; k._wired=true;

  k.addEventListener('pointerdown',e=>{ down=true; moved=false; sx=e.clientX; sy=e.clientY; samp=[{x:e.clientX,y:e.clientY,t:performance.now()}];
    if(kikoX==null)kikoX=100; const topScreen=window.innerHeight-(14+kikoY)-KSPRH; gox=e.clientX-kikoX; goy=e.clientY-topScreen;
    kikoState="held"; try{k.setPointerCapture(e.pointerId);}catch(_){}; e.preventDefault(); });
  k.addEventListener('pointermove',e=>{ if(!down)return; if(Math.abs(e.clientX-sx)>4||Math.abs(e.clientY-sy)>4)moved=true;
    kikoX=Math.max(0,Math.min(e.clientX-gox, window.innerWidth-KSPRW));
    kikoY=Math.max(0, window.innerHeight-(e.clientY-goy)-KSPRH-14);
    samp.push({x:e.clientX,y:e.clientY,t:performance.now()}); if(samp.length>5)samp.shift(); positionKikoUI(); });
  function end(e){ if(!down)return; down=false; try{k.releasePointerCapture(e.pointerId);}catch(_){}
    if(!moved){ kikoState="sit"; H.kikoToggle(); return; }
    const a=samp[0], z=samp[samp.length-1], d=Math.max(16,z.t-a.t);
    kikoVX=(z.x-a.x)/d*1000; kikoVY=-(z.y-a.y)/d*1000; kikoState="thrown"; }

function paintKiko(){

  c.innerHTML=`<div class="kiko-head"><div class="kiko-av"></div><div style="flex:1"><div style="font-family:var(--display);font-size:14px">Kiko ❄️</div><div class="label">your snowfox helper</div></div><button class="x" data-act="kikoToggle">✕</button></div>
    <div class="kiko-log" id="kikoLog">${logHtml}${KIKO.busy?`<div class="kiko-msg pet">…thinking ❄️</div>`:""}</div>
    <div class="kiko-input"><input class="inp" id="kikoInput" placeholder="tell Kiko to do something…" ${KIKO.busy?"disabled":""}><button class="btn btn-grad" data-act="kikoSend" ${KIKO.busy?"disabled":""}>send</button></div>`;
  const log=$("#kikoLog"); if(log) log.scrollTop=log.scrollHeight;
  const inp=$("#kikoInput"); if(inp&&!KIKO.busy) try{ inp.focus(); }catch(_){}
}
function kikoGreet(){
  if(KIKO.open) return; const b=$("#kikoBubble"); if(!b)return;
  b.textContent=KIKO_GREETS[Math.floor(Math.random()*KIKO_GREETS.length)];
  b.style.left=Math.max(10,Math.round((kikoX||100)-18))+"px"; b.style.right="auto";
  b.classList.remove("hidden");
  clearTimeout(b._h); b._h=setTimeout(()=>b.classList.add("hidden"),5500);
}

/* Kiko agent — execute an AI action against the app's data/state */
async function execAgentAction(a){
  if(!a||!a.type) return null; const T=a.type;
  try{
    if(T==="navigate"){ if(TABS.some(t=>t[0]===a.tab)) state.tab=a.tab; return "opened "+a.tab; }
    if(T==="addEvent"){ const ev={id:uid(),title:a.title||"event",date:a.date||TODAY,endDate:(a.endDate&&a.endDate>(a.date||TODAY))?a.endDate:null,time:a.time||"",tz:a.tz||"Europe/Amsterdam",note:a.note||"",url:a.url||"",color:(typeof CAL_COLORS!=="undefined"&&CAL_COLORS[1])||"#c9b8f0"};
      await DB.saveDaily(SENTINEL,n=>({...n,calendarEvents:[...(n.calendarEvents||[]),ev]})); return "📅 added “"+ev.title+"” ("+fmtDate(ev.date)+")"; }
    if(T==="addTask"){ await setSent(n=>({...n,tasks:[...(n.tasks||[]),{id:"t"+Date.now(),text:a.text,bucket:a.bucket||"personal",spoon:a.spoon||"some",done:false,sub:[]}]})); return "🗒️ task: "+a.text; }
    if(T==="addGoal"){ const key=a.period==="month"?"goalsMonth":"goalsWeek"; await setSent(n=>({...n,[key]:[...(n[key]||[]),{id:"g"+Date.now(),text:a.text,done:false}]})); return "🌷 "+(a.period==="month"?"monthly":"weekly")+" goal: "+a.text; }
    if(T==="logMind"){ await setToday(n=>{ const mind={...(n.mind||{})}; ["mood","anxiety","energy","weather"].forEach(k=>{ if(a[k]!=null) mind[k]=Math.max(0,Math.min(5,Number(a[k]))); }); if(a.kind!=null) mind.kind=!!a.kind; return {...n,mind}; }); return "💗 check-in logged"; }
    if(T==="logWeight"){ const v=Number(a.value); if(isNaN(v))return null; await setSent(n=>({...n,weightLog:[...(n.weightLog||[]),{date:TODAY,w:v}]})); return "⚖️ "+v+" "+CONFIG.weightUnit+" logged"; }
    if(T==="addNSV"){ await setSent(n=>({...n,nsv:[...(n.nsv||[]),{id:"n"+Date.now(),t:a.text,date:TODAY}]})); return "🌟 "+a.text; }
    if(T==="addMeasurement"){ const e={date:TODAY}; let any=false; ["bust","waist","hips","thighs","arms"].forEach(k=>{ const v=Number(a[k]); if(a[k]!=null&&!isNaN(v)){ e[k]=v; any=true; } }); if(!any)return null; await setSent(n=>({...n,measurements:[...(n.measurements||[]),e]})); return "📏 measurements saved"; }
    if(T==="logShot"){ const date=(!a.date||a.date==="today")?TODAY:a.date; const dose=Number(a.dose);
      await setSent(n=>{ const log=[...(n.injectionLog||[]),{id:"i"+Date.now(),date,time:a.time||"",dose,site:a.site||"",after:null,note:a.note||""}].sort((x,y)=>(x.date+(x.time||""))<(y.date+(y.time||""))?-1:1);
        let dh=n.doseHistory||[]; const cur=dh.slice().sort((p,q)=>p.started<q.started?-1:1).slice(-1)[0]; if(!cur||cur.dose!==dose) dh=[...dh,{dose,started:date}]; return {...n,injectionLog:log,doseHistory:dh}; }); return "💉 "+dose+"mg shot logged"; }
    if(T==="logWater"){ await setToday(n=>{ const mj={...(n.mounjaro||{})}; mj.water=Math.max(0,Number(a.cups)); return {...n,mounjaro:mj}; }); return "🥤 water: "+a.cups+" cups"; }
    if(T==="addCapture"){ await setSent(n=>({...n,captures:[...(n.captures||[]),{id:"cap"+Date.now(),text:a.text,date:TODAY}]})); return "🧠 "+a.text; }
    if(T==="addSticky"){ await addSticky(a.text); return "🗒️ sticky added"; }
    if(T==="cycleStart"){ await setSent(n=>{ const cycle={...(n.cycle||{}),lastStart:TODAY}; cycle.history=[...(cycle.history||[]),{start:TODAY,end:null,flow:"med"}]; return {...n,cycle}; }); return "🌙 period start logged"; }
    if(T==="cycleEnd"){ await setSent(n=>{ const c=n.cycle; if(!c||!c.history||!c.history.length)return n; const cycle={...c}; cycle.history=cycle.history.map((h,i)=>i===cycle.history.length-1?{...h,end:TODAY}:h); return {...n,cycle}; }); return "🌙 period end logged"; }
    if(T==="logPcos"){ await setToday(n=>{ const pcos={...(n.pcos||{})}; pcos[a.field]=Math.max(0,Math.min(5,Number(a.value))); return {...n,pcos}; }); return "❄️ "+a.field+" logged"; }
  }catch(e){ console.error("action failed",T,e); return null; }
  return null;
}

function start(){
  applyPrefs();
  try{ kikoStart(); setTimeout(kikoGreet,3500); setInterval(kikoGreet,45000); }catch(e){ console.error(e); }
  if(DEMO){ render(); return; }                 // demo: data is instant — one render
  // live: gentle loader while Supabase connects, then render ONCE (no double-load flash)
  const v=$("#view");
  if(v) v.innerHTML='<div class="panel" style="max-width:380px;margin:48px auto;text-align:center"><div style="font-size:28px">❄️🦊</div><p class="soft" style="margin:8px 0 0">Konfuyu~ getting your cozy space ready…</p></div>';
  const sc=document.createElement('script');
  sc.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";
  sc.onload=()=>{ try{ SB=window.supabase.createClient(CONFIG.url,CONFIG.anonKey); }catch(e){ console.error(e); } render(); };
  sc.onerror=()=>{ render(); };                 // offline fallback — render with whatever we have
  document.head.appendChild(sc);
}
start();
</script>
