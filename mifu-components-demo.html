<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mifuyu OS — UI components demo (progress · stat · switch)</title>
<style>
  /* ---- design tokens (mirrored from index.html so this previews standalone) ---- */
  :root{
    --bg:#eef2fb; --panel:#fff; --panel-soft:#f6f8ff; --line:#e4e6f5;
    --ink:#3a3550; --ink-soft:#6a6488; --muted:#9b96b6;
    --peri:#758ac6; --peri-deep:#5f74b4; --sakura:#ff9ed8; --sakura-deep:#ec74bf;
    --lav:#a98fe0; --lav-deep:#8d6fd1; --mint:#6fc3ab; --ice:#9fc3e8; --peach:#f3a978;
    --shadow:0 6px 22px rgba(120,130,200,.14); --shadow-sm:0 2px 8px rgba(120,130,200,.10);
    --r:18px; --sans:ui-rounded,"SF Pro Rounded",system-ui,sans-serif; --display:var(--sans);
    --dur-1:.12s; --dur-2:.2s; --dur-3:.34s;
    --ease:cubic-bezier(.22,.61,.36,1); --ease-spring:cubic-bezier(.2,.8,.3,1);
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:var(--sans); padding:28px 16px; line-height:1.5; }
  .wrap{ max-width:760px; margin:0 auto; display:flex; flex-direction:column; gap:18px; }
  h1{ font-family:var(--display); font-size:clamp(20px,5vw,28px); margin:0 0 2px; }
  .sub{ color:var(--ink-soft); font-size:14px; margin:0 0 6px; }
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:var(--r); padding:18px; box-shadow:var(--shadow-sm); }
  .panel h2{ font-family:var(--display); font-size:15px; margin:0 0 14px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
  .stack{ display:flex; flex-direction:column; gap:16px; }
  .divider{ height:1px; background:var(--line); margin:4px 0; }
  .label{ font-size:12px; color:var(--muted); margin:0 0 6px; }
  a:focus-visible,button:focus-visible,[tabindex]:focus-visible{ outline:2.5px solid var(--peri-deep); outline-offset:2px; }
  :focus:not(:focus-visible){ outline:none; }
  .sr-only{ position:absolute!important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0; }
  .skeleton{ position:relative; overflow:hidden; background:#eceaf4; border-radius:10px; }
  .skeleton::after{ content:""; position:absolute; inset:0; transform:translateX(-100%);
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent); animation:skshimmer 1.25s ease-in-out infinite; }
  @keyframes skshimmer{ 100%{ transform:translateX(100%);} }
  .sk-line{ height:12px; margin:9px 0; border-radius:7px; }

  /* ---- PROGRESS ---- */
  .progress{ display:block; }
  .progress-head{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin-bottom:6px; }
  .progress-label{ font-size:12.5px; color:var(--ink-soft); font-weight:600; }
  .progress-val{ font-size:11.5px; color:var(--muted); font-variant-numeric:tabular-nums; white-space:nowrap; }
  .progress-val b{ color:var(--ink); font-weight:700; }
  .progress-track{ position:relative; height:9px; border-radius:99px; background:var(--line); overflow:hidden; }
  .progress-fill{ position:absolute; top:0; bottom:0; left:0; border-radius:99px;
    background:linear-gradient(90deg,var(--peri),var(--peri-deep)); transition:width var(--dur-3) var(--ease); }
  .progress.tone-mint .progress-fill{ background:linear-gradient(90deg,var(--mint),#4fae93); }
  .progress.tone-sak  .progress-fill{ background:linear-gradient(90deg,var(--sakura),var(--sakura-deep)); }
  .progress.tone-lav  .progress-fill{ background:linear-gradient(90deg,var(--lav),var(--lav-deep)); }
  .progress.tone-peach .progress-fill{ background:linear-gradient(90deg,#f7c39a,var(--peach)); }
  .progress.is-complete .progress-fill{ background:linear-gradient(90deg,var(--mint),#4fae93); }
  .progress.is-over .progress-track{ box-shadow:inset 0 0 0 1.5px var(--peach); }
  .progress.is-over .progress-fill{ background:linear-gradient(90deg,var(--peach),#e0824f); }
  .progress.is-indeterminate .progress-fill{ width:35%!important; animation:progslide 1.15s ease-in-out infinite; }
  @keyframes progslide{ 0%{ left:-35%; } 100%{ left:100%; } }
  @media (prefers-reduced-motion:reduce){ .progress.is-indeterminate .progress-fill{ animation:none; left:0; } }

  /* ---- STAT ---- */
  .stat{ display:flex; flex-direction:column; gap:2px; }
  .stat-label{ display:flex; align-items:center; gap:6px; font-size:11px; letter-spacing:.03em;
    text-transform:uppercase; color:var(--muted); font-weight:700; }
  .stat-main{ display:flex; align-items:baseline; gap:7px; flex-wrap:wrap; }
  .stat-value{ font-family:var(--display); font-size:clamp(22px,4.5vw,28px); line-height:1.05;
    color:var(--ink); font-variant-numeric:tabular-nums; }
  .stat-unit{ font-size:13px; color:var(--ink-soft); font-weight:600; }
  .stat-delta{ display:inline-flex; align-items:center; gap:3px; font-size:12px; font-weight:700;
    padding:2px 8px; border-radius:99px; background:var(--panel-soft); color:var(--ink-soft); font-variant-numeric:tabular-nums; }
  .stat-delta.is-good{ background:rgba(111,195,171,.16); color:#3f9e83; }
  .stat-delta.is-bad{ background:rgba(243,169,120,.20); color:#cf7637; }
  .stat-delta.is-flat{ background:var(--line); color:var(--muted); }
  .stat-hint{ font-size:11.5px; color:var(--muted); margin-top:3px; line-height:1.4; }

  /* ---- SWITCH ---- */
  .switch-row{ display:flex; align-items:center; justify-content:space-between; gap:14px; }
  .switch-text{ display:flex; flex-direction:column; gap:1px; min-width:0; }
  .switch-label{ font-size:13.5px; color:var(--ink); font-weight:600; }
  .switch-hint{ font-size:11.5px; color:var(--muted); line-height:1.4; }
  .switch{ position:relative; flex:0 0 auto; width:46px; height:27px; border-radius:99px; border:none;
    cursor:pointer; padding:0; background:var(--line); transition:background var(--dur-2) var(--ease); -webkit-tap-highlight-color:transparent; }
  .switch::after{ content:""; position:absolute; top:3px; left:3px; width:21px; height:21px; border-radius:50%;
    background:#fff; box-shadow:var(--shadow-sm); transition:transform var(--dur-2) var(--ease-spring); }
  .switch[aria-checked="true"]{ background:linear-gradient(90deg,var(--peri),var(--peri-deep)); }
  .switch[aria-checked="true"]::after{ transform:translateX(19px); }
  .switch[aria-disabled="true"]{ opacity:.5; cursor:not-allowed; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Mifuyu OS — UI components</h1>
    <p class="sub">Three additions to the <code>UI.*</code> namespace: <b>progress</b>, <b>stat</b>, <b>toggle</b>. Try Tab + Space on the switches; toggling re-renders for real via the same <code>data-act</code> delegation the app uses.</p>
  </header>

  <section class="panel">
    <h2>UI.progress — daily targets</h2>
    <div class="stack" id="demo-progress"></div>
  </section>

  <section class="panel">
    <h2>UI.stat — vitals &amp; trends</h2>
    <div class="grid" id="demo-stat"></div>
  </section>

  <section class="panel">
    <h2>UI.toggle — adherence switches</h2>
    <div class="stack" id="demo-toggle"></div>
  </section>
</div>

<script>
/* ---- minimal copies of the app's primitives so the demo is self-contained ---- */
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const _dataAttrs = d => d ? Object.entries(d).map(([k,v])=>` data-${esc(k)}="${esc(String(v))}"`).join("") : "";
const _num = n => { const x = Number(n); if (!isFinite(x)) return "0"; return (Math.round(x*100)/100).toString(); };

/* ====== the exact helpers shipped into index.html ====== */
const UI = {
  progress({ value = 0, max = 100, label, tone = "peri", unit = "", showValue = true, valueText, indeterminate = false } = {}) {
    const m = Number(max) > 0 ? Number(max) : 0;
    let v = Number(value); if (!isFinite(v)) v = 0;
    const safeV = Math.max(0, v);
    const ind = indeterminate || m === 0;
    const pct = ind ? 35 : Math.max(0, Math.min(100, (safeV / m) * 100));
    const over = !ind && v > m;
    const complete = !ind && !over && pct >= 100;
    const u = unit ? esc(unit) : "";
    const cls = `progress tone-${esc(tone)}${over?" is-over":""}${complete?" is-complete":""}${ind?" is-indeterminate":""}`;
    const headRight = (showValue && !ind)
      ? `<span class="progress-val"><b>${esc(_num(safeV))}</b>${u} / ${esc(_num(m))}${u}</span>` : "";
    const head = (label || headRight)
      ? `<div class="progress-head">${label?`<span class="progress-label">${esc(label)}</span>`:"<span></span>"}${headRight}</div>` : "";
    const human = valueText || (ind ? "Loading" : `${_num(safeV)}${unit?" "+unit:""} of ${_num(m)}${unit?" "+unit:""}`);
    const aria = ind
      ? `role="progressbar" aria-label="${esc(label||"Loading")}"`
      : `role="progressbar" aria-valuenow="${esc(_num(safeV))}" aria-valuemin="0" aria-valuemax="${esc(_num(m))}" aria-valuetext="${esc(human)}"${label?` aria-label="${esc(label)}"`:""}`;
    return `<div class="${cls}">${head}<div class="progress-track" ${aria}><div class="progress-fill" style="width:${pct}%"></div></div></div>`;
  },
  stat({ label, value, unit, delta, deltaText, good, icon, hint, loading } = {}) {
    if (loading) {
      return `<div class="stat" aria-busy="true" aria-label="Loading ${esc(label||"stat")}"><div class="skeleton sk-line" style="width:42%;height:11px;margin:2px 0"></div><div class="skeleton" style="width:64%;height:26px;border-radius:9px;margin:8px 0 4px"></div></div>`;
    }
    let deltaHtml = "";
    if (delta !== undefined && delta !== null && delta !== "") {
      const dn = Number(delta);
      const dir = !isFinite(dn) ? "flat" : dn > 0 ? "up" : dn < 0 ? "down" : "flat";
      const tone = dir === "flat" ? "is-flat" : (good && good === dir) ? "is-good" : good ? "is-bad" : "";
      const arrow = dir === "up" ? "↑" : dir === "down" ? "↓" : "→";
      const shown = deltaText || (isFinite(dn) ? `${dn>0?"+":""}${_num(dn)}${unit?" "+unit:""}` : String(delta));
      const sr = dir === "up" ? "increased" : dir === "down" ? "decreased" : "no change";
      deltaHtml = `<span class="stat-delta ${tone}"><span aria-hidden="true">${arrow}</span>${esc(shown)}<span class="sr-only"> (${sr})</span></span>`;
    }
    return `<div class="stat"><span class="stat-label">${icon?`<span aria-hidden="true">${esc(icon)}</span>`:""}${esc(label||"")}</span>`
      + `<span class="stat-main"><span class="stat-value">${esc(value==null||value===""?"—":String(value))}</span>${unit?`<span class="stat-unit">${esc(unit)}</span>`:""}${deltaHtml}</span>`
      + `${hint?`<span class="stat-hint">${esc(hint)}</span>`:""}</div>`;
  },
  toggle({ label, on = false, act, data, hint, disabled, ariaLabel } = {}) {
    const name = ariaLabel || label || "toggle";
    const sw = `<button type="button" class="switch" role="switch" aria-checked="${on?"true":"false"}" aria-label="${esc(name)}"`
      + `${act?` data-act="${esc(act)}"`:""}${_dataAttrs(data)}${disabled?` disabled aria-disabled="true"`:""}></button>`;
    if (!label && !hint) return sw;
    return `<div class="switch-row"><span class="switch-text"><span class="switch-label">${esc(label||"")}</span>${hint?`<span class="switch-hint">${esc(hint)}</span>`:""}</span>${sw}</div>`;
  },
};

/* ---- usage examples ---- */
document.getElementById("demo-progress").innerHTML = [
  UI.progress({ label:"Protein", value:82, max:110, unit:"g", tone:"peri" }),
  UI.progress({ label:"Water", value:9, max:8, unit:"cups", tone:"peach" }),            // over-target → amber
  UI.progress({ label:"Fibre", value:28, max:28, unit:"g", tone:"mint" }),              // complete → mint
  UI.progress({ label:"Calories", value:0, max:1500, unit:"kcal", tone:"lav" }),        // empty edge case
  UI.progress({ label:"Syncing Withings…", indeterminate:true }),                       // unknown total
].join('<div class="divider"></div>');

document.getElementById("demo-stat").innerHTML = [
  UI.stat({ icon:"⚖️", label:"Weight", value:"80.9", unit:"kg", delta:-0.5, good:"down", hint:"vs last week" }),
  UI.stat({ icon:"💪", label:"Muscle", value:"46.6", unit:"%", delta:0.2, good:"up" }),
  UI.stat({ icon:"😴", label:"Sleep", value:"7.5", unit:"h", delta:0, good:"up" }),     // flat
  UI.stat({ icon:"🔥", label:"Resting HR", value:"69", unit:"bpm", delta:-1, good:"down" }),
  UI.stat({ icon:"🍽️", label:"Logged today", value:null, hint:"No meals yet" }),       // missing value
  UI.stat({ label:"Loading", loading:true }),                                           // loading state
].join("");

/* toggles — wired to a tiny data-act handler so re-render is real */
const toggleState = { protein:true, move:false, water:true, locked:false };
function renderToggles(){
  document.getElementById("demo-toggle").innerHTML = [
    UI.toggle({ label:"Protein with every meal", on:toggleState.protein, act:"flip", data:{ k:"protein" } }),
    UI.toggle({ label:"Gentle movement", hint:"a walk counts", on:toggleState.move, act:"flip", data:{ k:"move" } }),
    UI.toggle({ label:"Hit water goal", on:toggleState.water, act:"flip", data:{ k:"water" } }),
    UI.toggle({ label:"Layout locked", hint:"disabled example", on:toggleState.locked, act:"flip", data:{ k:"locked" }, disabled:true }),
  ].join('<div class="divider"></div>');
}
renderToggles();

/* mirrors the app's data-act event-delegation system */
document.addEventListener("click", e => {
  const el = e.target.closest("[data-act='flip']");
  if (!el) return;
  const k = el.dataset.k;
  toggleState[k] = !toggleState[k];
  renderToggles();
});
</script>
</body>
</html>
